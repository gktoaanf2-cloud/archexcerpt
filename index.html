<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH EXCERPT STUDIO V11</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* [시스템 폰트 각인] */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        @font-face { font-family: 'JoseonGulim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGu.woff') format('woff'); font-weight: normal; font-style: normal; font-display: swap; }
        @font-face { font-family: 'KoPubDotum'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubDotum.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'MaruBuri'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/MaruBuri-Regular.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'ChosunIlbo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Chosunilbo_myungjo.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'LeeSeoyun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Kkubulrim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/TTogether.woff') format('woff'); font-weight: normal; font-style: normal; }

        :root {
            --bg: #050506; --panel: #111112; --border: #222225;
            --accent: #f47b20; --text: #f0f0f0; --dim: #666;
        }

        body { background: var(--bg); color: var(--text); font-family: "Pretendard Variable", sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* [Header] */
        .header-area { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .sub-warning { font-size: 0.75rem; color: var(--dim); margin-top: 8px; font-weight: bold; letter-spacing: 1px; }

        .container { width: 100%; max-width: 1300px; }
        .editor-layout { display: flex; flex-direction: column; gap: 20px; }

        @media (min-width: 1000px) {
            .editor-layout { flex-direction: row; align-items: flex-start; gap: 40px; }
            .preview-section { flex: 1; position: sticky; top: 20px; }
            .panel-section { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
            body { padding: 40px; }
        }

        /* [Capture Engine] */
        .preview-wrapper { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        #capture-area { position: absolute; top: 0; left: 0; transform-origin: top left; background: var(--c1, #000); display: flex; align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden; }
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; }
        #drawing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
        .watermark { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: rgba(255,255,255,0.2); font-weight: 800; z-index: 100; pointer-events: none; }
        .excerpt-title { position: absolute; bottom: 30px; left: 40px; font-size: 24px; font-weight: 800; color: #fff; z-index: 100; pointer-events: none; }

        /* [Editor Content] */
        .rich-text { width: 100%; outline: none; white-space: pre-wrap; word-break: break-all; line-height: 1.6; position: relative; z-index: 5; }

        /* [Sticker Engine] */
        .sticker { position: absolute; z-index: 20; cursor: move; transform-origin: center; display: inline-block; padding: 15px; }
        .sticker img { display: block; max-width: 200px; height: auto; pointer-events: none; }
        .sticker-active { border: 2px dashed var(--accent); background: rgba(244,123,32,0.1); }
        .sticker-ctrl { position: absolute; width: 28px; height: 28px; background: #000; border: 2px solid #fff; border-radius: 50%; display: none; z-index: 30; text-align: center; line-height: 24px; color: #fff; font-size: 12px; }
        .sticker-active .sticker-ctrl { display: block; }
        .sticker-del { top: -14px; right: -14px; background: #ff4d4d; cursor: pointer; }
        .sticker-resize { bottom: -14px; right: -14px; background: var(--accent); cursor: se-resize; }
        .sticker-up { top: -14px; left: -14px; background: #4caf50; cursor: pointer; }
        .sticker-down { bottom: -14px; left: -14px; background: #2196f3; cursor: pointer; }

        /* [Panel UI] */
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 0.7rem; color: var(--dim); font-weight: 800; text-transform: uppercase; margin-bottom: 3px; display: block; }
        select, input[type="text"], textarea { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        
        .toolbar { display: flex; gap: 8px; background: #000; padding: 10px; border-radius: 8px; align-items: center; border: 1px solid var(--border); }
        .tool-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .tool-btn.active { background: var(--accent); color: #000; }
        .color-pick-btn { width: 32px; height: 32px; border: none; padding: 0; background: transparent; cursor: pointer; border-radius: 50%; overflow: hidden; }

        /* [Custom Sleek Range Slider] */
        input[type="range"] { -webkit-appearance: none; width: 100%; background: rgba(255,255,255,0.08); height: 2px; border-radius: 1px; outline: none; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-main { background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; width: 100%; }
        .btn-dim { background: #1a1a1c; color: var(--dim); border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; width: 100%; }
        
        details { background: #0c0c0d; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        summary { padding: 15px; font-weight: bold; cursor: pointer; color: var(--accent); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .details-in { padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* ⚙️ 보스 요구사항: 정돈된 고급조절 슬라이더 그리드 */
        .slider-box { display: flex; flex-direction: column; width: 100%; }
        .compact-row { display: flex; gap: 15px; align-items: flex-end; }
        .compact-row > div { flex: 1; min-width: 0; }
        .small-del-btn { background: #331111; color: #f55; border: 1px solid #442222; width: 60px; height: 32px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-bottom: 5px;}

        /* Theme Specifics */
        .theme-standard .card { position: relative; z-index: 2; background: transparent; padding: var(--pad, 80px); width: 80%; }
        /* ... 기타 테마 스타일 유지 ... */
        .theme-y2k { background: var(--c3, #fdf0f5) !important; }
        .theme-y2k .card { width: 85%; background: var(--c1, #dcbdf2); border: 4px solid #000; border-radius: 16px; padding: 0; box-shadow: 12px 12px 0px #000; display: flex; flex-direction: column; position: relative; z-index: 2; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>ARCH EXCERPT STUDIO V11</h1>
        <div class="sub-warning">ARCH 에이전트 전용 사이트 입니다. ARCH 이외의 사용금지.</div>
    </div>

    <div class="container">
        <div class="editor-layout">
            
            <div class="preview-section">
                <div class="preview-wrapper" id="preview-wrapper">
                    <div id="capture-area" class="theme-standard">
                        <div id="display-title" class="excerpt-title"></div>
                        <div class="watermark">ARCH @체리망고</div>
                        <img id="bgImg" class="bg-img" style="display:none;">
                        <canvas id="drawing-canvas" width="1080" height="1080"></canvas>

                        <div id="card" class="card">
                            <div id="text-body">
                                <div id="editor" class="rich-text" contenteditable="true" spellcheck="false">보스, 스티커와 서식 버그를 섬멸했습니다.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <button class="btn-dim" id="manualBtn" style="color:#88a;">📑 사용설명서 보기</button>

                <div class="panel">
                    <label>텍스트 포맷 무기고</label>
                    <div class="toolbar">
                        <button class="tool-btn" data-cmd="bold"><b>B</b></button>
                        <button class="tool-btn" data-cmd="italic"><i>I</i></button>
                        <button class="tool-btn" data-cmd="underline"><u>U</u></button>
                        <input type="color" class="color-pick-btn" id="fontColorPick">
                        <button class="tool-btn" id="hiBtn" style="background:#443311; border-color:#665522;">🖍️</button>
                        <button class="tool-btn" data-cmd="removeFormat"><i class="fa-solid fa-eraser"></i></button>
                    </div>
                </div>

                <div class="panel">
                    <label>🎨 데코레이션 부대</label>
                    <div class="toolbar">
                        <button class="tool-btn" id="drawBtn">🖌️ 낙서 OFF</button>
                        <button class="tool-btn" id="clearBtn" style="color:#f66;">포맷</button>
                        <input type="color" class="color-pick-btn" id="penColor" value="#ff0000">
                        <input type="range" id="penSize" min="2" max="40" value="6" style="width:60px; margin:0;">
                    </div>
                    <input type="file" id="stickerFile" accept="image/*" class="btn-dim" style="margin-top:5px;">
                </div>

                <div class="panel">
                    <label>ARCH LIST</label>
                    <div class="row-2"><select id="catSel"></select><select id="charSel"></select></div>
                    <div class="row-2">
                        <div><label>비율</label><select id="ratioSel"><option value="1:1">1:1</option><option value="9:16">9:16</option></select></div>
                        <div><label>테마</label><select id="themeSel"><option value="standard">Standard</option><option value="y2k">Y2K Player</option><option value="diary">Diary</option><option value="sf">Sci-Fi</option></select></div>
                    </div>
                    <div class="row-2">
                        <div><label>폰트</label><select id="fontSel"><option value="'Pretendard Variable'">프리텐다드</option><option value="'JoseonGulim'">조선굴림</option><option value="'KoPubDotum'">코펍돋움</option><option value="'MaruBuri'">마루부리</option><option value="'ChosunIlbo'">조선일보명조</option><option value="'LeeSeoyun'">이서윤체</option><option value="'Kkubulrim'">꾸불림체</option></select></div>
                        <div><label>크기</label><input type="range" id="sizeSlide" min="30" max="110" value="45"></div>
                    </div>
                </div>

                <details>
                    <summary>ADVANCED CUSTOM ⚙️</summary>
                    <div class="details-in">
                        <div class="compact-row">
                            <div class="slider-box"><label>Padding</label><input type="range" id="padSlide" min="20" max="160" value="80"></div>
                            <div class="slider-box"><label>Radius</label><input type="range" id="radSlide" min="0" max="100" value="25"></div>
                        </div>
                        <div style="border-top:1px solid #222; padding-top:10px;">
                            <label>배경 매핑 이미지</label>
                            <input type="file" id="bgFile" accept="image/*" class="btn-dim">
                            <div class="compact-row" style="margin-top:8px;">
                                <div class="slider-box"><label>Blur</label><input type="range" id="blurSlide" min="0" max="30" value="0"></div>
                                <button class="small-del-btn" id="delBgBtn">삭제</button>
                            </div>
                        </div>
                    </div>
                </details>

                <button class="btn-main" id="saveBtn">RENDER & SAVE PNG</button>
                <button class="btn-dim" id="resetBtn">FACTORY RESET</button>
            </div>
        </div>
    </div>

    <script>
        // [1. 데이터 및 초기화]
        const archList = { "ARCH-PRIMA": ["헬리오스", "해일", "이카로스", "산타"], "VANGUARD - 1": ["애쉬", "노아", "아모레", "셰인", "오버로드", "라임"], "VANGUARD - 2": ["신드롬", "바이브", "리암"], "AGENT": ["카토", "샤드", "블루"], "ACOLYTE": ["블루", "피카"], "CORE": ["닥터 밴스", "퓨어"], "R.S.T.": ["휴고", "저스티스", "에덴", "카르마"], "SUPPORT": ["오아시스", "자이안", "페더", "스트레이", "윈터", "부스터", "코드"] };
        const cap = document.getElementById('capture-area'), wrapper = document.getElementById('preview-wrapper'), editor = document.getElementById('editor');
        const catSel = document.getElementById('catSel'), charSel = document.getElementById('charSel'), displayTitle = document.getElementById('display-title');
        const ratioSel = document.getElementById('ratioSel'), themeSel = document.getElementById('themeSel'), fontSel = document.getElementById('fontSel'), sizeSlide = document.getElementById('sizeSlide');
        const padSlide = document.getElementById('padSlide'), radSlide = document.getElementById('radSlide'), blurSlide = document.getElementById('blurSlide');
        const bgImg = document.getElementById('bgImg'), dCanvas = document.getElementById('drawing-canvas'), dCtx = dCanvas.getContext('2d');
        let drawMode = false, isDrawing = false, currentZ = 20;

        // [2. 버그 수정 제 1전술: 서식 엔진 전면 교체]
        document.querySelectorAll('.tool-btn[data-cmd]').forEach(btn => {
            btn.onclick = () => {
                editor.focus();
                document.execCommand(btn.dataset.cmd, false, null);
            };
        });
        document.getElementById('fontColorPick').oninput = (e) => {
            editor.focus();
            document.execCommand('foreColor', false, e.target.value);
        };
        document.getElementById('hiBtn').onclick = () => {
            editor.focus();
            document.execCommand('backColor', false, 'rgba(255, 235, 59, 0.45)');
        };

        // [3. 버그 수정 제 2전술: 스티커 업로드 엔진 강화]
        document.getElementById('stickerFile').onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { createSticker(ev.target.result); };
            reader.readAsDataURL(file);
            this.value = ""; // 초기화하여 동일 파일 재업로드 허용
        };

        function createSticker(src) {
            const stk = document.createElement('div');
            stk.className = 'sticker';
            stk.style.left = '300px'; stk.style.top = '300px'; stk.style.zIndex = ++currentZ;
            
            const img = document.createElement('img');
            img.src = src;
            stk.appendChild(img);

            // 컨트롤들
            const addCtrl = (cls, html, fn) => {
                const c = document.createElement('div');
                c.className = 'sticker-ctrl ' + cls; c.innerHTML = html;
                c.onmousedown = (e) => { e.stopPropagation(); e.preventDefault(); fn(e); };
                stk.appendChild(c);
            };

            addCtrl('sticker-del', '<i class="fa-solid fa-xmark"></i>', () => stk.remove());
            addCtrl('sticker-resize', '', () => {}); // 리사이즈 로직은 하단 통합
            addCtrl('sticker-up', '<i class="fa-solid fa-angles-up"></i>', () => stk.style.zIndex = ++currentZ);
            addCtrl('sticker-down', '<i class="fa-solid fa-angles-down"></i>', () => stk.style.zIndex = Math.max(2, parseInt(stk.style.zIndex)-1));

            cap.appendChild(stk);
            initStickerEvents(stk, img);
        }

        function initStickerEvents(stk, img) {
            let isMoving = false, isResizing = false;
            let startX, startY, startW, startScale = 1, startRot = 0, center = {};

            stk.onmousedown = (e) => {
                if(drawMode || e.target.classList.contains('sticker-ctrl')) return;
                e.stopPropagation();
                document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
                stk.classList.add('sticker-active');
                isMoving = true;
                startX = e.clientX; startY = e.clientY;
            };

            const resizeBtn = stk.querySelector('.sticker-resize');
            resizeBtn.onmousedown = (e) => {
                e.stopPropagation(); e.preventDefault();
                isResizing = true;
                const rect = stk.getBoundingClientRect(), pRect = cap.getBoundingClientRect();
                const s = cap.width / pRect.width;
                center = { x: (rect.left + rect.width/2 - pRect.left)*s, y: (rect.top + rect.height/2 - pRect.top)*s };
                startX = (e.clientX - pRect.left)*s; startY = (e.clientY - pRect.top)*s;
                startLen = Math.hypot(startX - center.x, startY - center.y);
                startAngle = Math.atan2(startY - center.y, startX - center.x);
                const transform = window.getComputedStyle(stk).transform;
                if(transform && transform !== 'none') {
                    const v = transform.split('(')[1].split(')')[0].split(',');
                    startRot = Math.atan2(parseFloat(v[1]), parseFloat(v[0]));
                    startScale = Math.sqrt(v[0]*v[0] + v[1]*v[1]);
                } else { startRot = 0; startScale = 1; }
            };

            window.addEventListener('mousemove', (e) => {
                const pRect = cap.getBoundingClientRect();
                const s = 1080 / pRect.width;
                if(isMoving) {
                    stk.style.left = (parseFloat(stk.style.left) + (e.clientX - startX)*s) + 'px';
                    stk.style.top = (parseFloat(stk.style.top) + (e.clientY - startY)*s) + 'px';
                    startX = e.clientX; startY = e.clientY;
                }
                if(isResizing) {
                    const curX = (e.clientX - pRect.left)*s, curY = (e.clientY - pRect.top)*s;
                    const curLen = Math.hypot(curX - center.x, curY - center.y);
                    const curAngle = Math.atan2(curY - center.y, curX - center.x);
                    const finalScale = (curLen / startLen) * startScale;
                    const finalAngle = (curAngle - startAngle) + startRot;
                    stk.style.transform = `scale(${finalScale}) rotate(${finalAngle * (180/Math.PI)}deg)`;
                }
            });
            window.addEventListener('mouseup', () => { isMoving = false; isResizing = false; });
        }

        // [4. 기타 로직: 낙서, 레이아웃, 저장]
        drawBtn.onclick = () => { drawMode = !drawMode; drawBtn.innerText = drawMode ? "🖌️ 낙서 ON" : "🖌️ 낙서 OFF"; drawBtn.classList.toggle('active', drawMode); cap.style.pointerEvents = "auto"; dCanvas.style.pointerEvents = drawMode ? "auto" : "none"; };
        dCanvas.onmousedown = (e) => { if(!drawMode) return; isDrawing = true; const r = dCanvas.getBoundingClientRect(); const s = 1080/r.width; dCtx.beginPath(); dCtx.moveTo((e.clientX-r.left)*s, (e.clientY-r.top)*s); dCtx.strokeStyle = document.getElementById('penColor').value; dCtx.lineWidth = parseInt(document.getElementById('penSize').value); dCtx.lineCap="round"; dCtx.lineJoin="round"; };
        dCanvas.onmousemove = (e) => { if(!isDrawing) return; const r = dCanvas.getBoundingClientRect(); const s = 1080/r.width; dCtx.lineTo((e.clientX-r.left)*s, (e.clientY-r.top)*s); dCtx.stroke(); };
        window.onmouseup = () => isDrawing = false;
        document.getElementById('clearBtn').onclick = () => dCtx.clearRect(0,0,1080,1080);

        for(let cat in archList) catSel.add(new Option(cat, cat));
        catSel.onchange = () => { charSel.innerHTML = ""; archList[catSel.value].forEach(c => charSel.add(new Option(c, c))); updateUI(); };
        charSel.onchange = updateUI;

        function updateUI() {
            displayTitle.innerText = `[${catSel.value}] ${charSel.value}`;
            displayTitle.style.fontFamily = fontSel.value;
            editor.style.fontFamily = fontSel.value; editor.style.fontSize = sizeSlide.value + 'px';
            cap.style.setProperty('--pad', padSlide.value + 'px'); cap.style.setProperty('--rad', radSlide.value + 'px');
            bgImg.style.filter = `blur(${blurSlide.value}px)`;
            const w = 1080, h = ratioSel.value === '1:1' ? 1080 : 1920;
            cap.style.width = w + 'px'; cap.style.height = h + 'px'; dCanvas.width = w; dCanvas.height = h;
            const scale = wrapper.clientWidth / w; cap.style.transform = `scale(${scale})`; wrapper.style.height = (h*scale) + 'px';
        }

        ratioSel.onchange = updateUI; themeSel.onchange = () => { cap.className = 'theme-' + themeSel.value; updateUI(); };
        fontSel.onchange = updateUI; sizeSlide.oninput = updateUI; padSlide.oninput = updateUI; radSlide.oninput = updateUI; blurSlide.oninput = updateUI;
        document.getElementById('bgFile').onchange = (e) => { const reader = new FileReader(); reader.onload = (ev) => { bgImg.src = ev.target.result; bgImg.style.display = 'block'; }; reader.readAsDataURL(e.target.files[0]); };
        document.getElementById('delBgBtn').onclick = () => { bgImg.src = ""; bgImg.style.display = "none"; };
        document.getElementById('saveBtn').onclick = () => { document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active')); const orig = cap.style.transform; cap.style.transform = 'scale(1)'; html2canvas(cap, { scale: 1, useCORS: true }).then(canvas => { cap.style.transform = orig; const a = document.createElement('a'); a.download = 'ARCH_V11.png'; a.href = canvas.toDataURL(); a.click(); }); };
        document.getElementById('manualBtn').onclick = () => alert("보스, 여기에 설명서 내용을 입력하십시오!");
        document.getElementById('resetBtn').onclick = () => { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } };

        window.onload = () => { catSel.dispatchEvent(new Event('change')); updateUI(); };
    </script>
</body>
