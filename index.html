<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH EXCERPT STUDIO V5</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 폰트 로드 인프라 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        @font-face { font-family: 'JoseonGulim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGu.woff') format('woff'); font-weight: normal; font-display: swap; }
        @font-face { font-family: 'KoPubDotum'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubDotum.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'MaruBuri'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/MaruBuri-Regular.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'ChosunIlbo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Chosunilbo_myungjo.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'LeeSeoyun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Kkubulrim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/TTogether.woff') format('woff'); font-weight: normal; font-style: normal; }

        :root {
            --bg-base: #050506;
            --bg-panel: #111112;
            --border: #222225;
            --accent: #f47b20;
            --text: #f0f0f0;
        }

        body {
            background: var(--bg-base);
            color: var(--text);
            font-family: "Pretendard Variable", sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        .container { width: 100%; max-width: 1300px; }
        .editor-layout { display: flex; flex-direction: column; gap: 20px; }

        /* PC 가로 레이아웃 최적화 */
        @media (min-width: 1000px) {
            .editor-layout { flex-direction: row; align-items: flex-start; gap: 40px; }
            .preview-section { flex: 1; position: sticky; top: 20px; }
            .panel-section { width: 440px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px;}
            body { padding: 40px; }
        }

        /* 캡처 엔진 베이스 */
        .preview-wrapper {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px;
            overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        #capture-area {
            position: absolute; top: 0; left: 0; transform-origin: top left;
            background: var(--c1, #000); display: flex; align-items: center; justify-content: center;
        }

        /* 공통 오버레이 */
        .watermark { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: rgba(255,255,255,0.2); font-weight: 800; z-index: 100; letter-spacing: 1px; }
        .excerpt-title { position: absolute; bottom: 30px; left: 40px; font-size: 24px; font-weight: 800; color: var(--c2, #fff); z-index: 100; }

        /* [Theme 1] Standard */
        .theme-standard .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .theme-standard .card {
            position: relative; z-index: 2; background: rgba(0,0,0,var(--opac, 0.6)); padding: var(--pad, 80px);
            border-radius: var(--rad, 20px); border: 1px solid rgba(255,255,255,0.1); width: 80%;
        }

        /* [Theme 2] Y2K Music Player (Sleek Retro-App) */
        .theme-y2k { background: #08080a !important; }
        .theme-y2k .card {
            width: 85%; background: linear-gradient(135deg, #2d2d35, #111115); border-radius: 40px; padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 2px 2px rgba(255,255,255,0.1); border: 2px solid #333; position: relative;
        }
        .y2k-screen {
            background: var(--c1, #1a1a20); border-radius: 25px; padding: var(--pad, 60px);
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05);
            min-height: 450px; display: flex; align-items: center; justify-content: center;
        }
        .y2k-ui-elements { margin-top: 35px; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .y2k-bar { width: 60%; height: 6px; background: #333; border-radius: 3px; position: relative; }
        .y2k-bar::after { content:''; position: absolute; left:0; top:0; width:40%; height:100%; background: var(--accent); border-radius: 3px; box-shadow: 0 0 10px var(--accent); }
        .y2k-btns { display: flex; gap: 20px; color: #666; font-size: 32px; }

        /* [Theme 3] Diary (Binder & Grid) */
        .theme-diary { background: var(--c1, #f8f6f0) !important; background-image: radial-gradient(#d1d1d1 1.5px, transparent 1.5px); background-size: 30px 30px; }
        .theme-diary .card {
            width: 82%; background: #fff; padding: var(--pad, 80px); box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
            position: relative; border-left: 60px solid #fff;
        }
        .diary-holes {
            position: absolute; left: -45px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 40px 0;
        }
        .hole { width: 25px; height: 25px; background: var(--bg-base); border-radius: 50%; box-shadow: inset 3px 3px 5px rgba(0,0,0,0.5); }

        /* [Theme 4] SF Tech (HUD) */
        .theme-sf { background: #000 !important; }
        .theme-sf .card {
            width: 88%; padding: var(--pad, 70px); background: rgba(0,20,30, var(--opac, 0.5)); border: 1px solid var(--c1, #0ff);
            position: relative; box-shadow: inset 0 0 50px rgba(0,255,255,0.1);
        }
        .sf-line { position: absolute; background: var(--c1, #0ff); opacity: 0.5; }
        .sf-h { height: 1px; width: 100px; } .sf-v { width: 1px; height: 100px; }
        .sf-t { top: 20px; } .sf-b { bottom: 20px; } .sf-l { left: 20px; } .sf-r { right: 20px; }

        /* 에디터 필드 */
        .rich-text { width: 100%; outline: none; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }

        /* UI 패널 */
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 0.75rem; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input[type="text"], textarea, input[type="range"] { 
            width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: inherit;
        }
        
        .toolbar { display: flex; gap: 8px; background: #000; padding: 10px; border-radius: 8px; align-items: center; border: 1px solid #222; }
        .tool-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .color-wheel { width: 32px; height: 32px; border: none; padding: 0; background: transparent; cursor: pointer; border-radius: 50%; overflow: hidden; }

        .btn-export { background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-export:hover { filter: brightness(1.2); transform: translateY(-2px); }

        details { background: #111; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        summary { padding: 15px; font-weight: bold; cursor: pointer; color: var(--accent); list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: '＋'; font-size: 12px; }
        .details-in { padding: 20px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 15px; }

        .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .color-item { display: flex; align-items: center; gap: 10px; background: #000; padding: 10px; border-radius: 6px; border: 1px solid #222; }
        .color-item input { width: 40px; height: 30px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <h1>ARCH EXCERPT STUDIO V5</h1>

    <div class="container">
        <div class="editor-layout">
            
            <div class="preview-section">
                <div class="preview-wrapper" id="preview-wrapper">
                    <div id="capture-area" class="theme-standard">
                        <div id="display-title" class="excerpt-title"></div>
                        <div class="watermark">ARCH @체리망고</div>
                        <img id="bgImg" class="bg-img" style="display:none;">
                        
                        <div id="card" class="card">
                            <div class="sf-line sf-h sf-t sf-l"></div><div class="sf-line sf-v sf-t sf-l"></div>
                            <div class="sf-line sf-h sf-t sf-r"></div><div class="sf-line sf-v sf-t sf-r"></div>
                            <div class="sf-line sf-h sf-b sf-l"></div><div class="sf-line sf-v sf-b sf-l"></div>
                            <div class="sf-line sf-h sf-b sf-r"></div><div class="sf-line sf-v sf-b sf-r"></div>

                            <div class="diary-holes" id="diaryHoles">
                                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                            </div>

                            <div id="diaryTape" class="diary-tape" style="display:none;"></div>

                            <div id="y2k-screen" class="y2k-screen-wrap">
                                <div id="editor" class="rich-text" contenteditable="true" spellcheck="false">대사를 입력하십시오.</div>
                            </div>

                            <div id="y2k-ui" class="y2k-ui-elements" style="display:none;">
                                <div class="y2k-bar"></div>
                                <div class="y2k-btns">⏮ ● ⏭</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel">
                    <label>부분 서식 설정</label>
                    <div class="toolbar">
                        <button class="tool-btn" onclick="document.execCommand('bold')">B</button>
                        <button class="tool-btn" onclick="document.execCommand('italic')">I</button>
                        <input type="color" class="color-wheel" id="pColor" onchange="document.execCommand('foreColor', false, this.value)">
                        <button class="tool-btn" onclick="document.execCommand('removeFormat')" style="font-size:11px">초기화</button>
                    </div>
                </div>

                <div class="panel">
                    <label>ARCH LIST (작품 및 캐릭터)</label>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <select id="catSel"></select>
                        <select id="charSel"></select>
                    </div>
                </div>

                <div class="panel">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div>
                            <label>레이아웃 비율</label>
                            <select id="ratioSel">
                                <option value="1:1">1:1 Square</option>
                                <option value="9:16">9:16 Vertical</option>
                            </select>
                        </div>
                        <div>
                            <label>디자인 테마</label>
                            <select id="themeSel">
                                <option value="standard">Standard</option>
                                <option value="y2k">Y2K Player</option>
                                <option value="diary">Diary Paper</option>
                                <option value="sf">Sci-Fi HUD</option>
                            </select>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div>
                            <label>폰트 설정</label>
                            <select id="fontSel">
                                <option value="'Pretendard Variable'">프리텐다드</option>
                                <option value="'KoPubDotum'">코펍돋움</option>
                                <option value="'MaruBuri'">마루부리</option>
                                <option value="'ChosunIlbo'">조선일보명조</option>
                                <option value="'Noto Serif KR'">본명조</option>
                                <option value="'LeeSeoyun'">이서윤체</option>
                                <option value="'Kkubulrim'">꾸불림체</option>
                                <option value="'JoseonGulim'">조선굴림체</option>
                            </select>
                        </div>
                        <div>
                            <label>글자 크기</label>
                            <input type="range" id="sizeSlider" min="30" max="110" value="45">
                        </div>
                    </div>

                    <label>테마 커스텀 색상 (Main / Point)</label>
                    <div class="color-row">
                        <div class="color-item"><span>C1</span><input type="color" id="c1" value="#121212"></div>
                        <div class="color-item"><span>C2</span><input type="color" id="c2" value="#ffffff"></div>
                    </div>
                </div>

                <details>
                    <summary>ADVANCED CUSTOM (상세 조절)</summary>
                    <div class="details-in">
                        <label>카드 여백 (Padding)</label>
                        <input type="range" id="padSlider" min="20" max="160" value="80">
                        <label>카드 곡률 (Radius)</label>
                        <input type="range" id="radSlider" min="0" max="100" value="25">
                        <label>카드 투명도 (Standard/SF)</label>
                        <input type="range" id="opSlider" min="0" max="10" value="6">
                        <hr style="border:0; border-top:1px solid #222;">
                        <label>배경 이미지 업로드</label>
                        <input type="file" id="bgUp" accept="image/*">
                    </div>
                </details>

                <button class="btn-export" id="exportBtn">SAVE AS PNG</button>
            </div>
        </div>
    </div>

    <script>
        const archList = {
            "ARCH-PRIMA": ["헬리오스", "해일", "이카로스", "산타"],
            "VANGUARD - 1": ["애쉬", "노아", "아모레", "셰인", "오버로드", "라임"],
            "VANGUARD - 2": ["신드롬", "바이브", "리암"],
            "AGENT": ["카토", "샤드", "블루"],
            "ACOLYTE": ["블루", "피카"],
            "CORE": ["닥터 밴스", "퓨어"],
            "R.S.T.": ["휴고", "저스티스", "에덴", "카르마"],
            "SUPPORT": ["오아시스", "자이안", "페더", "스트레이", "윈터", "부스터", "코드"]
        };

        const captureArea = document.getElementById('capture-area');
        const previewWrapper = document.getElementById('preview-wrapper');
        const editor = document.getElementById('editor');
        const catSel = document.getElementById('catSel');
        const charSel = document.getElementById('charSel');
        const displayTitle = document.getElementById('display-title');
        
        // Settings elements
        const ratioSel = document.getElementById('ratioSel');
        const themeSel = document.getElementById('themeSel');
        const fontSel = document.getElementById('fontSel');
        const sizeSlider = document.getElementById('sizeSlider');
        const c1 = document.getElementById('c1');
        const c2 = document.getElementById('c2');
        const padSlider = document.getElementById('padSlider');
        const radSlider = document.getElementById('radSlider');
        const opSlider = document.getElementById('opSlider');
        const bgUp = document.getElementById('bgUp');
        const bgImg = document.getElementById('bgImg');

        // 테마별 특수 요소
        const y2kUi = document.getElementById('y2k-ui');
        const diaryHoles = document.getElementById('diaryHoles');
        const diaryTape = document.getElementById('diaryTape');

        // 카테고리 초기화
        for (let cat in archList) { catSel.add(new Option(cat, cat)); }
        function updateChars() {
            charSel.innerHTML = "";
            archList[catSel.value].forEach(c => charSel.add(new Option(c, c)));
            refreshTitle();
        }
        catSel.onchange = updateChars;
        charSel.onchange = refreshTitle;

        function refreshTitle() {
            displayTitle.innerText = `[${catSel.value}] ${charSel.value}`;
            displayTitle.style.fontFamily = fontSel.value;
        }

        function save() {
            const data = {
                cat: catSel.value, char: charSel.value, ratio: ratioSel.value, theme: themeSel.value,
                font: fontSel.value, size: sizeSlider.value, c1: c1.value, c2: c2.value,
                pad: padSlider.value, rad: radSlider.value, op: opSlider.value, content: editor.innerHTML
            };
            localStorage.setItem('arch_v5_save', JSON.stringify(data));
        }

        function load() {
            const s = JSON.parse(localStorage.getItem('arch_v5_save'));
            if(s) {
                catSel.value = s.cat; updateChars(); charSel.value = s.char;
                ratioSel.value = s.ratio; themeSel.value = s.theme; fontSel.value = s.font;
                sizeSlider.value = s.size; c1.value = s.c1; c2.value = s.c2;
                padSlider.value = s.pad; radSlider.value = s.rad; opSlider.value = s.op;
                if(s.content) editor.innerHTML = s.content;
            } else { updateChars(); }
        }

        function render() {
            const t = themeSel.value;
            captureArea.className = `theme-${t}`;
            
            // 테마별 UI 토글
            y2kUi.style.display = t === 'y2k' ? 'flex' : 'none';
            diaryHoles.style.display = t === 'diary' ? 'flex' : 'none';
            diaryTape.style.display = t === 'diary' ? 'block' : 'none';
            document.querySelectorAll('.sf-line').forEach(l => l.style.display = t === 'sf' ? 'block' : 'none');

            // CSS 변수 주입
            captureArea.style.setProperty('--c1', c1.value);
            captureArea.style.setProperty('--c2', c2.value);
            captureArea.style.setProperty('--pad', padSlider.value + 'px');
            captureArea.style.setProperty('--rad', radSlider.value + 'px');
            captureArea.style.setProperty('--opac', opSlider.value / 10);
            
            editor.style.fontFamily = fontSel.value;
            editor.style.fontSize = sizeSlider.value + 'px';
            editor.style.color = (t === 'y2k' || t === 'diary') ? '#000' : c2.value;
            if(t === 'y2k') editor.style.color = c2.value; // Y2K는 액센트 컬러를 따름

            refreshTitle();
            updateLayout();
            save();
        }

        function updateLayout() {
            const w = 1080;
            const h = ratioSel.value === '1:1' ? 1080 : 1920;
            captureArea.style.width = w + 'px';
            captureArea.style.height = h + 'px';
            const scale = previewWrapper.clientWidth / w;
            captureArea.style.transform = `scale(${scale})`;
            previewWrapper.style.height = (h * scale) + 'px';
        }

        bgUp.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { bgImg.src = ev.target.result; bgImg.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        };

        document.querySelectorAll('input, select').forEach(el => el.oninput = render);
        editor.oninput = save;
        window.onresize = updateLayout;

        document.getElementById('exportBtn').onclick = () => {
            const orig = captureArea.style.transform;
            captureArea.style.transform = 'scale(1)';
            html2canvas(captureArea, { scale: 1, useCORS: true }).then(canvas => {
                captureArea.style.transform = orig;
                const a = document.createElement('a');
                a.download = `ARCH_EXCERPT_${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
            });
        };

        window.onload = () => { load(); render(); };
    </script>
</body>
</html>
