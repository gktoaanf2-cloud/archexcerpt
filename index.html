<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH EXCERPT STUDIO V7</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        
        @font-face { font-family: 'KoPubDotum'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubDotum.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'MaruBuri'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/MaruBuri-Regular.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'ChosunIlbo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Chosunilbo_myungjo.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'LeeSeoyun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Kkubulrim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/TTogether.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'JoseonGulim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGu.woff') format('woff'); font-weight: normal; font-display: swap; }

        :root {
            --bg-base: #050506;
            --bg-panel: #111112;
            --border: #222225;
            --accent: #f47b20;
            --text: #f0f0f0;
        }

        body {
            background: var(--bg-base);
            color: var(--text);
            font-family: "Pretendard Variable", sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            user-select: none;
        }

        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; margin-bottom: 30px; color: #fff; }

        .container { width: 100%; max-width: 1300px; }
        .editor-layout { display: flex; flex-direction: column; gap: 20px; }

        @media (min-width: 1000px) {
            .editor-layout { flex-direction: row; align-items: flex-start; gap: 40px; }
            .preview-section { flex: 1; position: sticky; top: 20px; }
            .panel-section { width: 440px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px;}
            body { padding: 40px; }
        }

        .preview-wrapper {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px;
            overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        #capture-area {
            position: absolute; top: 0; left: 0; transform-origin: top left;
            background: var(--c1, #000); display: flex; align-items: center; justify-content: center;
            box-sizing: border-box; overflow: hidden;
        }

        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; pointer-events: none; }

        .watermark { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: rgba(255,255,255,0.2); font-weight: 800; z-index: 100; letter-spacing: 1px; pointer-events: none;}
        .excerpt-title { position: absolute; bottom: 30px; left: 40px; font-size: 24px; font-weight: 800; color: var(--text-color, #fff); z-index: 100; pointer-events: none;}

        .rich-text { width: 100%; outline: none; white-space: pre-wrap; word-break: break-all; line-height: 1.6; position: relative; z-index: 5; }
        .rich-text i, .rich-text em { font-style: italic !important; }
        .rich-text b, .rich-text strong { font-weight: bold !important; }

        /* [Theme 1] Standard - 말풍선 완전 투명화 */
        .theme-standard .card {
            position: relative; z-index: 2; background: transparent !important; padding: var(--pad, 80px);
            border-radius: 0; border: none !important; width: 80%; box-shadow: none !important;
        }

        /* [Theme 2] Y2K Kitsch Music Player */
        .theme-y2k { background: var(--c3, #fdf0f5) !important; }
        .theme-y2k .card {
            width: 85%; background: var(--c1, #dcbdf2); border: 4px solid #000; border-radius: 16px; padding: 0;
            box-shadow: 12px 12px 0px #000; display: flex; flex-direction: column; position: relative; z-index: 2;
        }
        .theme-y2k .y2k-top-bar { 
            background: var(--c2, #ffb3d9); border-bottom: 4px solid #000; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0;
        }
        .theme-y2k .y2k-brand { font-family: 'Arial Black', sans-serif; font-size: 20px; color: #000; letter-spacing: -1px; display:flex; align-items: center; gap: 10px;}
        .theme-y2k .y2k-window-controls { display: flex; gap: 8px; }
        .theme-y2k .y2k-window-controls span { width: 18px; height: 18px; border: 3px solid #000; background: #fff; box-shadow: 2px 2px 0px #000; border-radius: 50%;}
        
        .theme-y2k .y2k-screen-wrap { padding: 30px; background: transparent; }
        .theme-y2k .y2k-screen {
            background: var(--c4, #ffffff); border: 4px solid #000; border-radius: 12px; padding: var(--pad, 50px);
            box-shadow: inset 5px 5px 0px rgba(0,0,0,0.05); min-height: 400px; display: flex; align-items: center; justify-content: center;
        }
        .theme-y2k .y2k-ui-elements {
            padding: 0 30px 40px 30px; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box;
        }
        .theme-y2k .y2k-bar { width: 50%; height: 12px; background: #fff; border: 3px solid #000; border-radius: 6px; box-shadow: 2px 2px 0px #000; position: relative; }
        .theme-y2k .y2k-bar::after { content:''; position: absolute; left:0; top:0; width:45%; height:100%; background: var(--c2, #ffb3d9); border-right: 3px solid #000; }
        .theme-y2k .y2k-btns { display: flex; gap: 15px; }
        .theme-y2k .y2k-btn {
            width: 55px; height: 50px; border: 3px solid #000; background: #fff; border-radius: 12px;
            box-shadow: 4px 4px 0px #000; display: flex; align-items: center; justify-content: center;
            font-size: 22px; color: #000; font-weight: 900;
        }

        /* [Theme 3] Diary */
        .theme-diary { background: var(--c1, #f4f1ea) !important; }
        .theme-diary .card {
            width: 80%; background: #fff; padding: var(--pad, 80px); 
            box-shadow: 15px 15px 0px rgba(0,0,0,0.08); position: relative; border-radius: 5px;
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px), linear-gradient(90deg, #e0e0e0 1px, transparent 1px);
            background-size: 40px 40px; border: 1px solid #ddd; z-index: 2;
        }
        .theme-diary .tape { position: absolute; top: -25px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 220px; height: 55px; background: var(--c2, rgba(255, 200, 200, 0.7)); z-index: 10; }

        /* [Theme 4] SF Tech */
        .theme-sf { background: #020204 !important; }
        .theme-sf .card {
            width: 85%; padding: var(--pad, 70px); background: var(--c2, rgba(0, 15, 25, 0.7)); border: 1px solid var(--c1, #0ff);
            position: relative; box-shadow: inset 0 0 60px rgba(0,255,255,0.05); backdrop-filter: blur(10px); z-index: 2;
        }
        .sf-line { position: absolute; background: var(--c1, #0ff); }
        .sf-h { height: 2px; width: 80px; } .sf-v { width: 2px; height: 80px; }
        .sf-t { top: -1px; } .sf-b { bottom: -1px; } .sf-l { left: -1px; } .sf-r { right: -1px; }

        /* 캔버스 오버레이 레이어 (낙서 & 스티커) */
        #drawing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
        .sticker { position: absolute; z-index: 20; cursor: move; transform-origin: center; display: inline-block; padding: 5px;}
        .sticker img { display: block; max-width: 150px; height: auto; pointer-events: none; }
        .sticker-active { border: 2px dashed #0ff; background: rgba(0,255,255,0.1); }
        .sticker-ctrl { position: absolute; width: 20px; height: 20px; background: #000; border: 2px solid #fff; border-radius: 50%; display: none; z-index: 25; cursor: sw-resize;}
        .sticker-active .sticker-ctrl { display: block; }
        .sticker-delete { top: -10px; right: -10px; background: #ff4d4d; color: #fff; font-size: 12px; font-weight: bold; text-align: center; line-height: 18px; cursor: pointer; }
        .sticker-resize { bottom: -10px; right: -10px; background: #00ffff; }

        /* 패널 UI */
        .panel { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 0.75rem; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        select, input[type="text"], textarea, input[type="range"] { width: 100%; padding: 12px; background: #000; border: 1px solid #222; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        
        .toolbar { display: flex; gap: 6px; background: #000; padding: 10px; border-radius: 8px; align-items: center; border: 1px solid #222; flex-wrap: wrap; }
        .tool-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
        .color-picker-btn { width: 32px; height: 32px; border: none; padding: 0; background: transparent; cursor: pointer; border-radius: 50%; overflow: hidden; }

        .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .color-item { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 8px 12px; border-radius: 6px; border: 1px solid #222; font-size: 11px;}
        .color-item input { width: 35px; height: 25px; border: none; background: none; cursor: pointer; }

        details { background: #111; border-radius: 8px; border: 1px solid #222; overflow: hidden; }
        summary { padding: 15px; font-weight: bold; cursor: pointer; color: var(--accent); list-style: none; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-export { background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; width: 100%; margin-top: 5px;}
        .btn-sub { background: #222; color: #aaa; border: 1px solid #333; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px;}
    </style>
</head>
<body>

    <h1>ARCH EXCERPT STUDIO V7</h1>

    <div class="container">
        <div class="editor-layout">
            
            <div class="preview-section">
                <div class="preview-wrapper" id="preview-wrapper">
                    <div id="capture-area" class="theme-standard">
                        <div id="display-title" class="excerpt-title"></div>
                        <div class="watermark">ARCH @체리망고</div>
                        <img id="bgImg" class="bg-img" style="display:none;">
                        
                        <!-- 그리기 캔버스 레이어 -->
                        <canvas id="drawing-canvas" width="1080" height="1080"></canvas>

                        <div id="card" class="card">
                            <div class="sf-line sf-h sf-t sf-l"></div><div class="sf-line sf-v sf-t sf-l"></div>
                            <div class="sf-line sf-h sf-t sf-r"></div><div class="sf-line sf-v sf-t sf-r"></div>
                            <div class="sf-line sf-h sf-b sf-l"></div><div class="sf-line sf-v sf-b sf-l"></div>
                            <div class="sf-line sf-h sf-b sf-r"></div><div class="sf-line sf-v sf-b sf-r"></div>

                            <div id="diaryTape" class="tape" style="display:none;"></div>

                            <div id="y2k-top" class="y2k-top-bar" style="display:none;">
                                <span class="y2k-brand">Retro Music Vibe</span>
                                <div class="y2k-window-controls"><span></span><span></span><span></span></div>
                            </div>
                            
                            <div id="y2k-screen" class="y2k-screen-wrap">
                                <div id="text-body" class="y2k-screen" style="padding:0; border:none; background:transparent; box-shadow:none;">
                                    <div id="editor" class="rich-text" contenteditable="true" spellcheck="false">대사를 입력하십시오.</div>
                                </div>
                            </div>

                            <div id="y2k-ui" class="y2k-ui-elements" style="display:none;">
                                <div class="y2k-bar"></div>
                                <div class="y2k-btns">
                                    <div class="y2k-btn">⏮</div>
                                    <div class="y2k-btn" style="background:var(--c2)">▶</div>
                                    <div class="y2k-btn">⏭</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <div class="panel">
                    <label>텍스트 일반 서식 및 기능</label>
                    <div class="toolbar">
                        <button class="tool-btn" onclick="document.execCommand('bold')">B</button>
                        <button class="tool-btn" onclick="document.execCommand('italic')">I</button>
                        <button class="tool-btn" onclick="document.execCommand('underline')">U</button>
                        <input type="color" class="color-picker-btn" id="pColor" onchange="document.execCommand('foreColor', false, this.value)">
                        
                        <!-- 형광펜 버튼 추가 -->
                        <button class="tool-btn" id="hiliteBtn" onclick="document.execCommand('backColor', false, 'rgba(255, 235, 59, 0.5)')">🖍️ 형광펜</button>
                        <button class="tool-btn" onclick="document.execCommand('removeFormat')" style="font-size:11px">초기화</button>
                    </div>
                </div>

                <!-- 캔버스 드로잉 & 그래픽스 제어 센터 -->
                <div class="panel">
                    <label>🎨 자유 낙서 및 스티커 데코레이션</label>
                    <div class="toolbar" style="gap:10px;">
                        <button class="tool-btn" id="drawModeBtn">🖌️ 낙서 모드: OFF</button>
                        <button class="tool-btn" id="clearDrawBtn" style="background:#331111;">전체 지우기</button>
                        <input type="color" class="color-picker-btn" id="brushColor" value="#ff0000">
                        <input type="range" id="brushSize" min="2" max="30" value="6" style="width:70px; padding:0;">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:5px;">
                        <label>🦄 나만의 스티커 추가 (제한 없음)</label>
                        <input type="file" id="stickerUp" accept="image/*" class="btn-sub">
                    </div>
                </div>

                <div class="panel">
                    <label>ARCH LIST (발췌 작품 소속)</label>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <select id="catSel"></select>
                        <select id="charSel"></select>
                    </div>
                </div>

                <div class="panel">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div>
                            <label>레이아웃 비율</label>
                            <select id="ratioSel">
                                <option value="1:1">1:1 Square</option>
                                <option value="9:16">9:16 Vertical</option>
                            </select>
                        </div>
                        <div>
                            <label>디자인 테마</label>
                            <select id="themeSel">
                                <option value="standard">Standard (일반)</option>
                                <option value="y2k">Y2K Music Player</option>
                                <option value="diary">Diary (다이어리)</option>
                                <option value="sf">Sci-Fi (SF 테크)</option>
                            </select>
                        </div>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div>
                            <label>폰트 설정</label>
                            <select id="fontSel">
                                <option value="'Pretendard Variable'">프리텐다드</option>
                                <option value="'KoPubDotum'">코펍돋움</option>
                                <option value="'MaruBuri'">마루부리</option>
                                <option value="'ChosunIlbo'">조선일보명조</option>
                                <option value="'Noto Serif KR'">본명조</option>
                                <option value="'LeeSeoyun'">이서윤체</option>
                                <option value="'Kkubulrim'">꾸불림체</option>
                                <option value="'JoseonGulim'">조선굴림체</option>
                            </select>
                        </div>
                        <div>
                            <label>글자 크기</label>
                            <input type="range" id="sizeSlider" min="30" max="110" value="45">
                        </div>
                    </div>

                    <!-- 보스 지시사항: Y2K 풀 세분화 컬러 파트 지정 -->
                    <label id="colorCtrlLabel">🎨 테마 레이아웃 디테일 컬러 스케일</label>
                    <div class="color-grid" id="colorGridContainer">
                        <div class="color-item"><span>C1 (메인/몸체)</span><input type="color" id="c1" value="#dcbdf2"></div>
                        <div class="color-item"><span>C2 (포인트/바)</span><input type="color" id="c2" value="#ffb3d9"></div>
                        <div class="color-item" id="y2k-c3-item"><span>C3 (바깥 배경)</span><input type="color" id="c3" value="#fdf0f5"></div>
                        <div class="color-item" id="y2k-c4-item"><span>C4 (내부 스크린)</span><input type="color" id="c4" value="#ffffff"></div>
                    </div>
                </div>

                <details>
                    <summary>ADVANCED CUSTOM (고급 조절)</summary>
                    <div class="details-in">
                        <label>카드 여백 (Padding)</label>
                        <input type="range" id="padSlider" min="20" max="160" value="80">
                        <label>카드 곡률 (Radius)</label>
                        <input type="range" id="radSlider" min="0" max="100" value="25">
                        <hr style="border:0; border-top:1px solid #222;">
                        <label>배경 맵핑 이미지 투입</label>
                        <input type="file" id="bgUp" accept="image/*">
                        <button class="btn-sub" id="delBgBtn" style="background:#442222; margin-top:5px; width:100%;">⚙️ 투입된 배경 이미지 삭제</button>
                    </div>
                </details>

                <button class="btn-export" id="exportBtn">SAVE AS PNG (고화질 저장)</button>
                <button class="btn-sub" id="resetBtn" style="width:100%;">모든 설정 초기화</button>
            </div>
        </div>
    </div>

    <script>
        const archList = {
            "ARCH-PRIMA": ["헬리오스", "해일", "이카로스", "산타"],
            "VANGUARD - 1": ["애쉬", "노아", "아모레", "셰인", "오버로드", "라임"],
            "VANGUARD - 2": ["신드롬", "바이브", "리암"],
            "AGENT": ["카토", "샤드", "블루"],
            "ACOLYTE": ["블루", "피카"],
            "CORE": ["닥터 밴스", "퓨어"],
            "R.S.T.": ["휴고", "저스티스", "에덴", "카르마"],
            "SUPPORT": ["오아시스", "자이안", "페더", "스트레이", "윈터", "부스터", "코드"]
        };

        const captureArea = document.getElementById('capture-area');
        const previewWrapper = document.getElementById('preview-wrapper');
        const editor = document.getElementById('editor');
        const catSel = document.getElementById('catSel');
        const charSel = document.getElementById('charSel');
        const displayTitle = document.getElementById('display-title');
        
        const ratioSel = document.getElementById('ratioSel');
        const themeSel = document.getElementById('themeSel');
        const fontSel = document.getElementById('fontSel');
        const sizeSlider = document.getElementById('sizeSlider');
        const c1 = document.getElementById('c1');
        const c2 = document.getElementById('c2');
        const c3 = document.getElementById('c3');
        const c4 = document.getElementById('c4');
        
        const padSlider = document.getElementById('padSlider');
        const radSlider = document.getElementById('radSlider');
        const bgUp = document.getElementById('bgUp');
        const bgImg = document.getElementById('bgImg');
        const delBgBtn = document.getElementById('delBgBtn');

        const y2kTop = document.getElementById('y2k-top');
        const y2kUi = document.getElementById('y2k-ui');
        const textBody = document.getElementById('text-body');
        const diaryTape = document.getElementById('diaryTape');

        // 드로잉 시스템
        const dCanvas = document.getElementById('drawing-canvas');
        const dCtx = dCanvas.getContext('2d');
        let isDrawing = false;
        let drawMode = false;

        // 카테고리 구성
        for (let cat in archList) { catSel.add(new Option(cat, cat)); }
        function updateChars() {
            charSel.innerHTML = "";
            archList[catSel.value].forEach(c => charSel.add(new Option(c, c)));
            refreshTitle();
        }
        catSel.onchange = updateChars;
        charSel.onchange = refreshTitle;

        function refreshTitle() {
            displayTitle.innerText = `[${catSel.value}] ${charSel.value}`;
            displayTitle.style.fontFamily = fontSel.value;
        }

        // 초기화 버튼
        document.getElementById('resetBtn').onclick = () => {
            if(confirm("모든 편집 레이아웃 설정을 초기화하시겠습니까?")) {
                localStorage.removeItem('arch_v7_save');
                location.reload();
            }
        };

        // 1. 드로잉 엔진 (그림판 메커니즘 탑재)
        const drawModeBtn = document.getElementById('drawModeBtn');
        const brushColor = document.getElementById('brushColor');
        const brushSize = document.getElementById('brushSize');
        
        drawModeBtn.onclick = () => {
            drawMode = !drawMode;
            drawModeBtn.classList.toggle('active', drawMode);
            drawModeBtn.innerText = drawMode ? "🖌️ 낙서 모드: ON" : "🖌️ 낙서 모드: OFF";
            dCanvas.style.pointerEvents = drawMode ? "auto" : "none";
        };

        document.getElementById('clearDrawBtn').onclick = () => {
            if(confirm("작성된 모든 수수낙서를 포맷하겠습니까?")) {
                dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
            }
        };

        function getCanvasMousePos(e) {
            const rect = dCanvas.getBoundingClientRect();
            // 화면상 축소된 해상도를 실제 캔버스 내부 좌표계(1080)로 매핑 연산
            return {
                x: (e.clientX - rect.left) * (dCanvas.width / rect.width),
                y: (e.clientY - rect.top) * (dCanvas.height / rect.height)
            };
        }

        dCanvas.onmousedown = (e) => {
            if(!drawMode) return;
            isDrawing = true;
            const pos = getCanvasMousePos(e);
            dCtx.beginPath();
            dCtx.moveTo(pos.x, pos.y);
            dCtx.strokeStyle = brushColor.value;
            dCtx.lineWidth = parseInt(brushSize.value);
            dCtx.lineCap = "round";
            dCtx.lineJoin = "round";
        };

        dCanvas.onmousemove = (e) => {
            if(!isDrawing || !drawMode) return;
            const pos = getCanvasMousePos(e);
            dCtx.lineTo(pos.x, pos.y);
            dCtx.stroke();
        };

        window.addEventListener('mouseup', () => isDrawing = false);

        // 2. 프리미엄 스티커 엔진 
        const stickerUp = document.getElementById('stickerUp');
        stickerUp.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                createStickerElement(ev.target.result);
            };
            reader.readAsDataURL(file);
            stickerUp.value = ""; // 재업로드 가능바인딩
        };

        function createStickerElement(src) {
            const stk = document.createElement('div');
            stk.className = 'sticker';
            stk.style.left = '100px';
            stk.style.top = '100px';
            
            const img = document.createElement('img');
            img.src = src;
            stk.appendChild(img);

            // 삭제 버튼 조립
            const del = document.createElement('div');
            del.className = 'sticker-ctrl sticker-delete';
            del.innerText = '×';
            del.onclick = (e) => { e.stopPropagation(); stk.remove(); };
            stk.appendChild(del);

            // 정비율 리사이즈/회전 복합 조작기 조립
            const resize = document.createElement('div');
            resize.className = 'sticker-ctrl sticker-resize';
            stk.appendChild(resize);

            captureArea.appendChild(stk);
            makeStickerInteractable(stk, resize, img);
        }

        function makeStickerInteractable(stk, resize, img) {
            let isMoving = false, isResizing = false;
            let startX, startY, startWidth, startScale = 1, startAngle = 0;
            let center = {x: 0, y: 0};

            // 활성화 선택 해제 흐름 제어
            stk.onmousedown = (e) => {
                if(drawMode) return;
                e.stopPropagation();
                document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
                stk.classList.add('sticker-active');
                isMoving = true;
                
                const rect = captureArea.getBoundingClientRect();
                const scale = captureArea.width / rect.width;
                startX = e.clientX * scale;
                startY = e.clientY * scale;
            };

            resize.onmousedown = (e) => {
                e.stopPropagation();
                isResizing = true;
                const rect = stk.getBoundingClientRect();
                const parentRect = captureArea.getBoundingClientRect();
                const scale = captureArea.width / parentRect.width;
                
                center = {
                    x: (rect.left + rect.width/2 - parentRect.left) * scale,
                    y: (rect.top + rect.height/2 - parentRect.top) * scale
                };
                
                startX = e.clientX * scale;
                startY = e.clientY * scale;
                startWidth = img.clientWidth;
                
                // 현재 트랜스폼 회전각/스케일 파싱 파트
                const style = window.getComputedStyle(stk);
                const transform = style.transform;
                if(transform && transform !== 'none') {
                    const values = transform.split('(')[1].split(')')[0].split(',');
                    const a = parseFloat(values[0]), b = parseFloat(values[1]);
                    startAngle = Math.atan2(b, a);
                    startScale = Math.sqrt(a*a + b*b);
                } else {
                    startAngle = 0; startScale = 1;
                }
            };

            window.addEventListener('mousemove', (e) => {
                const parentRect = captureArea.getBoundingClientRect();
                const scale = captureArea.width / parentRect.width;
                const curX = e.clientX * scale;
                const curY = e.clientY * scale;

                if (isMoving) {
                    const dx = curX - startX;
                    const dy = curY - startY;
                    stk.style.left = (parseFloat(stk.style.left) + dx) + 'px';
                    stk.style.top = (parseFloat(stk.style.top) + dy) + 'px';
                    startX = curX; startY = curY;
                }

                if (isResizing) {
                    // 회전 각 연산
                    const dx = curX - center.x;
                    const dy = curY - center.y;
                    const curAngle = Math.atan2(dy, dx);
                    const angleRad = curAngle - (Math.atan2(startY - center.y, startX - center.x) - startAngle);
                    const angleDeg = angleRad * (180 / Math.PI);

                    // 비율 고정 정밀 크기 연산
                    const distStart = Math.hypot(startX - center.x, startY - center.y);
                    const distCur = Math.hypot(dx, dy);
                    const finalScale = (distCur / distStart) * startScale;

                    stk.style.transform = `scale(${finalScale}) rotate(${angleDeg}deg)`;
                }
            });

            window.addEventListener('mouseup', () => { isMoving = false; isResizing = false; });
            // 바탕화면 누르면 선택해제
            captureArea.addEventListener('mousedown', () => stk.classList.remove('sticker-active'));
        }

        // 3. 배경 이미지 완벽 제어 & 밀어내기 파괴 (Z-Index 배치 고정)
        delBgBtn.onclick = () => {
            bgImg.src = "";
            bgImg.style.display = "none";
            bgUp.value = "";
            render();
        };

        bgUp.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => { 
                    bgImg.src = ev.target.result; 
                    bgImg.style.display = 'block'; 
                    render();
                };
                reader.readAsDataURL(file);
            }
        };

        // 데이터 동기화 파트
        function save() {
            const data = {
                cat: catSel.value, char: charSel.value, ratio: ratioSel.value, theme: themeSel.value,
                font: fontSel.value, size: sizeSlider.value, c1: c1.value, c2: c2.value, c3: c3.value, c4: c4.value,
                pad: padSlider.value, rad: radSlider.value, content: editor.innerHTML
            };
            localStorage.setItem('arch_v7_save', JSON.stringify(data));
        }

        function load() {
            const s = JSON.parse(localStorage.getItem('arch_v7_save'));
            if(s) {
                catSel.value = s.cat; updateChars(); charSel.value = s.char;
                ratioSel.value = s.ratio; themeSel.value = s.theme; fontSel.value = s.font;
                sizeSlider.value = s.size; c1.value = s.c1; c2.value = s.c2;
                if(s.c3) c3.value = s.c3; if(s.c4) c4.value = s.c4;
                padSlider.value = s.pad; radSlider.value = s.rad;
                if(s.content) editor.innerHTML = s.content;
            } else { updateChars(); }
        }

        function render() {
            const t = themeSel.value;
            captureArea.className = `theme-${t}`;
            
            // UI 레이아웃 상태 가시성 토글
            y2kTop.style.display = t === 'y2k' ? 'flex' : 'none';
            y2kUi.style.display = t === 'y2k' ? 'flex' : 'none';
            diaryTape.style.display = t === 'diary' ? 'block' : 'none';
            document.querySelectorAll('.sf-line').forEach(l => l.style.display = t === 'sf' ? 'block' : 'none');

            // 보스 지시사양: Y2K 컬러 스케일 세분화 가시 바인딩
            document.getElementById('y2k-c3-item').style.display = t === 'y2k' ? 'flex' : 'none';
            document.getElementById('y2k-c4-item').style.display = t === 'y2k' ? 'flex' : 'none';

            // 이미지 밀어내기 원천 전술 봉쇄용 절대좌표 주입 검증
            if(bgImg.src && bgImg.style.display !== 'none') {
                bgImg.style.position = "absolute";
                bgImg.style.zIndex = "1";
            }

            // CSS 믹싱 주입
            captureArea.style.setProperty('--c1', c1.value);
            captureArea.style.setProperty('--c2', c2.value);
            captureArea.style.setProperty('--c3', c3.value);
            captureArea.style.setProperty('--c4', c4.value);
            captureArea.style.setProperty('--pad', padSlider.value + 'px');
            captureArea.style.setProperty('--rad', radSlider.value + 'px');
            
            editor.style.fontFamily = fontSel.value;
            editor.style.fontSize = sizeSlider.value + 'px';

            // 보스 확정사양: 텍스트 기본색은 레이아웃 필드와 철저히 독립 분리
            if(t === 'y2k' || t === 'diary') {
                captureArea.style.setProperty('--text-color', '#000000');
            } else {
                captureArea.style.setProperty('--text-color', '#ffffff');
            }

            if(t === 'y2k') {
                textBody.className = "y2k-screen";
                textBody.style.padding = 'var(--pad, 50px)';
            } else {
                textBody.className = "";
                textBody.style.padding = '0';
            }

            refreshTitle();
            updateLayout();
            save();
        }

        function updateLayout() {
            const w = 1080;
            const h = ratioSel.value === '1:1' ? 1080 : 1920;
            captureArea.style.width = w + 'px';
            captureArea.style.height = h + 'px';
            
            // 낙서 드로잉 레이어 해상도 완벽 동기화 정밀 동반 축소
            dCanvas.width = w;
            dCanvas.height = h;

            const scale = previewWrapper.clientWidth / w;
            captureArea.style.transform = `scale(${scale})`;
            previewWrapper.style.height = (h * scale) + 'px';
        }

        document.querySelectorAll('input, select').forEach(el => el.oninput = render);
        editor.oninput = save;
        window.onresize = updateLayout;

        // 최종 빌더 세이브 기어
        document.getElementById('exportBtn').onclick = () => {
            // 선택 점선 박스 일시적 숨김처리 전술
            document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
            
            const orig = captureArea.style.transform;
            captureArea.style.transform = 'scale(1)';
            
            html2canvas(captureArea, { scale: 1, useCORS: true }).then(canvas => {
                captureArea.style.transform = orig;
                const a = document.createElement('a');
                a.download = `ARCH_EXCERPT_STUDIO_${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
            });
        };

        window.onload = () => { load(); render(); };
    </script>
</body>
</html>
