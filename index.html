<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH EXCERPT STUDIO</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        @font-face { font-family: 'JoseonGulim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGu.woff') format('woff'); font-weight: normal; font-style: normal; font-display: swap; }
        @font-face { font-family: 'KoPubDotum'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubDotum.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'MaruBuri'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/MaruBuri-Regular.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'ChosunIlbo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Chosunilbo_myungjo.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'LeeSeoyun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Kkubulrim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/TTogether.woff') format('woff'); font-weight: normal; font-style: normal; }

        :root { 
            --bg: #090a0c; 
            --panel: rgba(15, 16, 20, 0.45); 
            --border: rgba(255, 255, 255, 0.15); 
            --border-glow: rgba(255, 255, 255, 0.4);
            --accent: #ffffff; 
            --text: #e0e0e0; 
            --dim: #7a7a85; 
            --holo: rgba(0, 255, 255, 0.15);
        }

        body { 
            background: var(--bg); 
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, transparent 50%),
                linear-gradient(0deg, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
            color: var(--text); 
            font-family: "Pretendard Variable", sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden; user-select: none;
        }

        .header-area { text-align: center; margin-bottom: 30px; position: relative; }
        .header-area::after { content: ''; display: block; width: 40px; height: 1px; background: var(--accent); margin: 15px auto 0; box-shadow: 0 0 8px var(--accent); }
        h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 6px; margin: 0; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .sub-warning { font-size: 0.7rem; color: var(--dim); margin-top: 8px; font-weight: normal; letter-spacing: 2px; }

        .container { width: 100%; max-width: 1300px; }
        .editor-layout { display: flex; flex-direction: column; gap: 20px; }

        @media (min-width: 1000px) {
            .editor-layout { flex-direction: row; align-items: flex-start; gap: 40px; }
            .preview-section { flex: 1; position: sticky; top: 20px; }
            .panel-section { width: 420px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
            body { padding: 40px; }
        }

        .preview-wrapper { 
            width: 100%; background: #000; 
            border: 1px solid var(--border-glow); 
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8); 
            overflow: hidden; position: relative; 
        }
        #capture-area { position: absolute; top: 0; left: 0; transform-origin: top left; width: 1080px; height: 1080px; background: var(--c1, #000); display: flex; align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden; }
        
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; pointer-events: none; }
        #drawing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; touch-action: none; }
        
        .info-group { position: absolute; bottom: 35px; left: 45px; z-index: 100; pointer-events: none; display: flex; flex-direction: column; gap: 2px; }
        .info-title { font-size: 22px; font-weight: 800; color: var(--text-color, #fff); letter-spacing: 1px; text-shadow: 0 2px 6px rgba(0,0,0,0.8); }
        .info-watermark { font-size: 13px; font-weight: 300; color: rgba(255,255,255,0.6); letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        #r19-badge { display: none; position: absolute; top: 35px; right: 35px; z-index: 999; background: #e50914; color: #fff; font-weight: 900; font-size: 22px; text-align: center; border-radius: 50%; width: 80px; height: 80px; border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transform: rotate(15deg); flex-direction: column; justify-content: center; line-height: 1.1; pointer-events: none; }
        #r19-badge span { font-size: 11px; }

        .rich-text { width: 100%; outline: none; white-space: pre-wrap; word-break: break-all; line-height: 1.6; position: relative; z-index: 5; color: var(--editor-color, #ffffff); }
        .rich-text i, .rich-text em { font-style: italic !important; }
        .rich-text b, .rich-text strong { font-weight: bold !important; }

        #card { box-sizing: border-box; transition: 0.3s; }
        
        .theme-standard #card { background: transparent !important; border: none !important; box-shadow: none !important; width: 85%; position: relative; z-index: 2; padding: var(--pad, 80px); }
        .theme-polaroid { background: var(--c1, #e0e0e0) !important; }
        .theme-polaroid #card { width: 80%; background: var(--c4, #ffffff); padding: 40px 40px 120px 40px; box-shadow: 10px 15px 30px rgba(0,0,0,0.3); position: relative; z-index: 2; color: #000 !important; }
        .theme-polaroid #card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); pointer-events: none; }

        .theme-y2k { background: var(--c3, #fdf0f5) !important; }
        .theme-y2k #card { width: 85%; background: var(--c1, #dcbdf2); border: 4px solid #000; border-radius: 16px; padding: 0; box-shadow: 12px 12px 0px #000; display: flex; flex-direction: column; position: relative; z-index: 2; overflow: hidden;}
        .y2k-top-bar { background: var(--c2, #ffb3d9); border-bottom: 4px solid #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .y2k-brand { font-family: 'Arial Black', sans-serif; font-size: 20px; color: #000; letter-spacing: -1px; display:flex; align-items: center; gap: 10px;}
        .y2k-brand::before { content: '✨'; font-size: 24px; }
        .y2k-window-controls { display: flex; gap: 8px; }
        .y2k-window-controls span { width: 18px; height: 18px; border: 3px solid #000; background: #fff; box-shadow: 2px 2px 0px #000; border-radius: 50%;}
        .y2k-window-controls span:nth-child(1) { background: #ffea75; }
        .y2k-window-controls span:nth-child(2) { background: #a2fca2; }
        .y2k-window-controls span:nth-child(3) { background: #ff7e7e; }
        .y2k-screen-wrap { padding: 30px; background: transparent; }
        .y2k-screen { background: var(--c4, #ffffff); border: 4px solid #000; border-radius: 12px; padding: var(--pad, 50px); box-shadow: inset 5px 5px 0px rgba(0,0,0,0.05); min-height: 400px; display: flex; align-items: center; justify-content: center; color: #000 !important; box-sizing: border-box; width: 100%;}
        .y2k-ui-elements { padding: 0 30px 40px 30px; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; }
        .y2k-bar { width: 50%; height: 12px; background: #fff; border: 3px solid #000; border-radius: 6px; box-shadow: 2px 2px 0px #000; position: relative; }
        .y2k-bar::after { content:''; position: absolute; left:0; top:0; width:45%; height:100%; background: var(--c2, #ffb3d9); border-right: 3px solid #000; }
        .y2k-btns { display: flex; gap: 15px; }
        .y2k-btn { width: 55px; height: 50px; border: 3px solid #000; background: #fff; border-radius: 12px; box-shadow: 4px 4px 0px #000; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #000; font-weight: 900; }

        .theme-diary { background: var(--c1, #f4f1ea) !important; }
        .theme-diary #card { width: 85%; background: #fff; padding: var(--pad, 80px); box-shadow: 15px 15px 0px rgba(0,0,0,0.08); position: relative; border-left: 60px solid #fff; border-radius: 5px; z-index: 2; color: #000 !important; }
        .diary-holes { position: absolute; left: -45px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 40px 0; z-index: 10; }
        .hole { width: 25px; height: 25px; background: var(--c1, #f4f1ea); border-radius: 50%; box-shadow: inset 3px 3px 5px rgba(0,0,0,0.5); }
        .tape { position: absolute; top: -25px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 220px; height: 55px; background: var(--c2, rgba(255, 200, 200, 0.7)); z-index: 11; }

        /* [미학적으로 완전 개편된 SF 테마 - NieR / 무기미도 스타일] */
        .theme-sf { background: #050505 !important; }
        .theme-sf #card { 
            width: 85%; 
            padding: calc(var(--pad, 60px) + 20px) var(--pad, 60px); 
            background: rgba(10, 11, 14, 0.65); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            z-index: 2; 
        }
        
        /* 내부 이너 프레임 (여백의 미 극대화) */
        .theme-sf #card::before { 
            content:''; position: absolute; 
            top: 12px; left: 12px; right: 12px; bottom: 12px; 
            border: 1px solid rgba(255,255,255,0.04); 
            pointer-events: none; z-index: 1; 
        }
        
        /* 극도로 얇고 날카로운 모서리 브라켓 (1px) */
        .sf-line { position: absolute; background: var(--c2, #ffffff); z-index: 5; opacity: 0.65; }
        .sf-h { height: 1px; width: 18px; } .sf-v { width: 1px; height: 18px; }
        .sf-t { top: -1px; } .sf-b { bottom: -1px; } .sf-l { left: -1px; } .sf-r { right: -1px; }
        
        /* 폰트를 정제하고, 빛번짐(Text-shadow)을 제거한 미니멀 터미널 텍스트 */
        .sf-deco-text { 
            position: absolute; 
            color: var(--c2, #ffffff); 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 10px; 
            letter-spacing: 4px; 
            opacity: 0.45; 
            z-index: 10; 
            pointer-events: none; 
        }
        
        /* 텍스트 배치: 카드 프레임 바깥/안쪽 경계선에 걸치도록 세팅 */
        .sf-deco-text.top-left { top: -22px; left: 0; font-weight: bold; opacity: 0.7;}
        .sf-deco-text.top-right { top: -22px; right: 0; }
        .sf-deco-text.bottom-left { bottom: -22px; left: 0; opacity: 0.3; }
        .sf-deco-text.bottom-right { bottom: -22px; right: 0; opacity: 0.3; }

        .sticker { position: absolute; z-index: 20; padding: 15px; cursor: move; touch-action: none;}
        .sticker img { display: block; max-width: 250px; height: auto; pointer-events: none; user-select: none; }
        .sticker-active { border: 1px solid rgba(255,255,255,0.5) !important; background: rgba(255,255,255,0.05); }
        .sticker-ctrl { position: absolute; width: 26px; height: 26px; background: #000; border: 1px solid #fff; border-radius: 50%; display: none; z-index: 1000; text-align: center; line-height: 24px; color: #fff; cursor: pointer; font-size: 12px; touch-action: none;}
        .sticker-active .sticker-ctrl { display: block !important; }
        .sticker-del { top: -13px; right: -13px; background: #ff4d4d; }
        .sticker-resize { bottom: -13px; right: -13px; background: #fff; color: #000; cursor: se-resize; }
        .sticker-up { top: -13px; left: -13px; background: #333; }
        .sticker-down { bottom: -13px; left: -13px; background: #333; }

        .panel { 
            background: var(--panel); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border); 
            box-shadow: inset 0 0 10px rgba(255,255,255,0.02);
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            position: relative;
        }
        .panel::before { content:''; position:absolute; top:-1px; left:-1px; width:10px; height:10px; border-top: 1px solid #fff; border-left: 1px solid #fff; }
        .panel::after { content:''; position:absolute; bottom:-1px; right:-1px; width:10px; height:10px; border-bottom: 1px solid #fff; border-right: 1px solid #fff; }

        label { font-size: 0.65rem; color: var(--text); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; display: block; opacity: 0.8;}
        
        select, input[type="text"], textarea { 
            width: 100%; padding: 10px; 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid var(--border); 
            color: #fff; 
            box-sizing: border-box; font-size: 0.85rem; outline: none; transition: 0.3s;
        }
        select:focus, input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 5px rgba(255,255,255,0.2); }
        input::placeholder { color: rgba(255,255,255,0.3); }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: rgba(255,255,255,0.1); height: 1px; outline: none; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border: 1px solid #fff; background: #000; cursor: pointer; transition: 0.2s; }
        input[type="range"]::-webkit-slider-thumb:hover { background: #fff; }

        .toolbar { display: flex; gap: 6px; background: rgba(0,0,0,0.3); padding: 8px; align-items: center; border: 1px solid var(--border); flex-wrap: wrap; }
        .tool-btn { background: transparent; color: var(--text); border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; cursor: pointer; font-size: 12px; transition: 0.2s; display:flex; align-items:center; justify-content:center;}
        .tool-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
        .tool-btn.active { background: var(--accent); color: #000; }
        .color-pick { width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.3); padding: 0; background: transparent; cursor: pointer; overflow: hidden; border-radius: 4px; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .btn-main { background: transparent; color: #fff; padding: 16px; border: 1px solid var(--accent); font-size: 0.9rem; font-weight: 300; letter-spacing: 3px; cursor: pointer; width: 100%; transition: 0.3s; position: relative; overflow: hidden; }
        .btn-main::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(255,255,255,0.1); transition: 0.3s; }
        .btn-main:hover::before { left: 0; }
        .btn-main:hover { box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .btn-dim { background: rgba(0,0,0,0.5); color: var(--dim); border: 1px solid var(--border); padding: 10px; cursor: pointer; font-size: 11px; width: 100%; letter-spacing: 1px; transition: 0.2s;}
        .btn-dim:hover { border-color: #fff; color: #fff; }
        
        details { background: rgba(0,0,0,0.3); border: 1px solid var(--border); }
        summary { padding: 15px; font-weight: 300; letter-spacing: 2px; cursor: pointer; color: var(--accent); display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; }
        .details-in { padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .compact-row { display: flex; gap: 15px; align-items: flex-end; }
        .compact-row > div { flex: 1; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .color-item { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 6px 10px; border: 1px solid var(--border); font-size: 10px; font-family: monospace;}
        
        .r19-switch-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        .r19-switch { width: 12px; height: 12px; border: 1px solid var(--dim); background: transparent; transition: 0.3s; }
        .r19-switch.active { background: #e50914; border-color: #e50914; box-shadow: 0 0 10px rgba(229,9,20,0.8); }
        .r19-label { font-size: 0.7rem; color: var(--text); font-weight: 300; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>ARCH EXCERPT STUDIO</h1>
        <div class="sub-warning">SYSTEM ONLINE. UNAUTHORIZED ACCESS PROHIBITED.</div>
    </div>

    <div class="container">
        <div class="editor-layout">
            
            <div class="preview-section">
                <div class="preview-wrapper" id="preview-wrapper">
                    <div id="capture-area" class="theme-standard">
                        
                        <div id="info-group" class="info-group">
                            <div id="display-title" class="info-title"></div>
                            <div id="display-watermark" class="info-watermark"></div>
                        </div>

                        <div id="bgImg" class="bg-img"></div>
                        <canvas id="drawing-canvas" width="1080" height="1080"></canvas>
                        
                        <div id="r19-badge">19금<span>주딱ON</span></div>

                        <div id="card" class="card">
                            <!-- 극도로 절제된 SF 단말기 디테일 -->
                            <div class="sf-item sf-line sf-h sf-t sf-l" style="display:none;"></div><div class="sf-item sf-line sf-v sf-t sf-l" style="display:none;"></div>
                            <div class="sf-item sf-line sf-h sf-t sf-r" style="display:none;"></div><div class="sf-item sf-line sf-v sf-t sf-r" style="display:none;"></div>
                            <div class="sf-item sf-line sf-h sf-b sf-l" style="display:none;"></div><div class="sf-item sf-line sf-v sf-b sf-l" style="display:none;"></div>
                            <div class="sf-item sf-line sf-h sf-b sf-r" style="display:none;"></div><div class="sf-item sf-line sf-v sf-b sf-r" style="display:none;"></div>
                            
                            <div class="sf-item sf-deco-text top-left" style="display:none;">SYS.DATA_LOG // 0x00A8F</div>
                            <div class="sf-item sf-deco-text top-right" style="display:none;">[ CLR : 0 ]</div>
                            <div class="sf-item sf-deco-text bottom-left" style="display:none;">WARNING_</div>
                            <div class="sf-item sf-deco-text bottom-right" style="display:none;">CH. OVERRIDE</div>

                            <div class="diary-item diary-holes" id="diaryHoles" style="display:none;">
                                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                            </div>
                            <div class="diary-item tape" id="diaryTape" style="display:none;"></div>

                            <div class="y2k-item y2k-top-bar" id="y2k-top" style="display:none;">
                                <span class="y2k-brand">Retro Player</span>
                                <div class="y2k-window-controls"><span></span><span></span><span></span></div>
                            </div>

                            <div id="y2k-screen-wrap">
                                <div id="editor" class="rich-text" contenteditable="true" spellcheck="false">대화를 입력하십시오.</div>
                            </div>

                            <div class="y2k-item y2k-ui-elements" id="y2k-ui" style="display:none;">
                                <div class="y2k-bar"></div>
                                <div class="y2k-btns">⏮ ● ⏭</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <button class="btn-dim" id="manualBtn" style="color:#fff; border-color: rgba(255,255,255,0.4);">📑 DATA MANUAL (사용설명서)</button>

                <div class="panel">
                    <label>텍스트 포맷 (Format)</label>
                    <div class="toolbar">
                        <button class="tool-btn" id="bBtn" style="font-weight:bold;">B</button>
                        <button class="tool-btn" id="iBtn" style="font-style:italic;">I</button>
                        <button class="tool-btn" id="uBtn" style="text-decoration:underline;">U</button>
                        <button class="tool-btn" id="alignLeftBtn"><i class="fa-solid fa-align-left"></i></button>
                        <button class="tool-btn" id="alignCenterBtn"><i class="fa-solid fa-align-center"></i></button>
                        <button class="tool-btn" id="alignRightBtn"><i class="fa-solid fa-align-right"></i></button>
                        
                        <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 4px;"></div>
                        
                        <div style="display:flex; align-items:center; gap:5px;">
                            <label style="margin:0; font-size:9px;">TEXT</label>
                            <input type="color" class="color-pick" id="fColor" value="#ffffff">
                        </div>
                        
                        <div style="display:flex; align-items:center; gap:5px; margin-left: 5px;">
                            <label style="margin:0; font-size:9px;">HL COLOR</label>
                            <input type="color" class="color-pick" id="hlColor" value="#ffeb3b">
                        </div>
                        <button class="tool-btn" id="hiBtn" style="color:#ffeb3b; font-weight:bold;">HL ON</button>
                        <button class="tool-btn" id="removeHiBtn">HL OFF</button>
                    </div>
                </div>

                <div class="panel">
                    <label>데코레이션 (Decoration)</label>
                    <div class="toolbar">
                        <button class="tool-btn" id="drawBtn">PEN OFF</button>
                        <button class="tool-btn" id="clearBtn">CLEAR ALL</button>
                        <input type="color" class="color-pick" id="penColor" value="#ffffff">
                        <input type="range" id="penSize" min="2" max="40" value="6" style="width:60px;">
                    </div>
                    <label style="margin-top: 10px;">스티커 추가 (Add Sticker)</label>
                    <input type="file" id="stickerFile" accept="image/*" class="btn-dim">
                </div>

                <div class="panel">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <label style="margin:0;">데이터 셋업 (Data Setup)</label>
                        <button class="tool-btn" id="customToggleBtn" style="font-size:10px; border-color:rgba(255,255,255,0.5);">CUSTOM OFF</button>
                    </div>
                    
                    <div id="preset-mode" class="row-2">
                        <select id="catSel"></select>
                        <select id="charSel"></select>
                    </div>
                    
                    <!-- 커스텀 자캐/앤오 입력 모드 -->
                    <div id="custom-mode" style="display:none; flex-direction:column; gap:10px;">
                        <div class="row-2">
                            <input type="text" id="customCat" placeholder="UNKNOWN">
                            <input type="text" id="customChar" placeholder="UNKNOWN">
                        </div>
                        <input type="text" id="customCreator" placeholder="SAMPLE">
                    </div>

                    <div class="row-2" style="margin-top: 15px;">
                        <div><label>비율</label><select id="ratioSel"><option value="1:1">1:1 (SQUARE)</option><option value="9:16">9:16 (STORY)</option></select></div>
                        <div><label>테마</label><select id="themeSel"><option value="standard">Standard</option><option value="polaroid">Polaroid</option><option value="y2k">Y2K Player</option><option value="diary">Diary</option><option value="sf">SF Terminal</option></select></div>
                    </div>
                    <div class="row-2">
                        <div><label>폰트</label><select id="fontSel"><option value="'Pretendard Variable'">프리텐다드</option><option value="'JoseonGulim'">조선굴림</option><option value="'KoPubDotum'">코펍돋움</option><option value="'MaruBuri'">마루부리</option><option value="'ChosunIlbo'">조선일보명조</option><option value="'LeeSeoyun'">이서윤체</option><option value="'Kkubulrim'">꾸불림체</option></select></div>
                        <div><label>크기</label><input type="range" id="sizeSlide" min="30" max="110" value="45"></div>
                    </div>
                    
                    <label style="margin-top: 10px;">레이아웃 색상 (Color Matrix)</label>
                    <div class="color-grid">
                        <div class="color-item"><span>C1</span><input type="color" id="c1" value="#000000" class="color-pick" style="border:none;"></div>
                        <div class="color-item"><span>C2</span><input type="color" id="c2" value="#ffffff" class="color-pick" style="border:none;"></div>
                        <div class="color-item" id="c3-box" style="display:none;"><span>C3</span><input type="color" id="c3" value="#fdf0f5" class="color-pick" style="border:none;"></div>
                        <div class="color-item" id="c4-box" style="display:none;"><span>C4</span><input type="color" id="c4" value="#ffffff" class="color-pick" style="border:none;"></div>
                    </div>
                </div>

                <details>
                    <summary>ADVANCED PARAMETERS <i class="fa-solid fa-gear"></i></summary>
                    <div class="details-in">
                        <div class="compact-row">
                            <div><label>Padding</label><input type="range" id="padSlide" min="20" max="160" value="80"></div>
                            <div><label>Radius</label><input type="range" id="radSlide" min="0" max="100" value="0"></div>
                        </div>
                        <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:15px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                                <label style="margin:0;">배경 이미지 (Background)</label>
                                <div class="r19-switch-wrap" id="r19Btn">
                                    <div class="r19-switch" id="r19Toggle"></div>
                                    <span class="r19-label">R-19 MARK</span>
                                </div>
                            </div>
                            <input type="file" id="bgFile" accept="image/*" class="btn-dim">
                            <div class="compact-row" style="margin-top:8px;">
                                <div style="flex:2"><label>Blur</label><input type="range" id="blurSlide" min="0" max="30" value="0"></div>
                                <button id="delBgBtn" style="background:transparent; color:#f55; border:1px solid rgba(255,85,85,0.4); height:30px; padding:0 10px; cursor:pointer; font-size:10px; margin-bottom:12px; transition:0.2s;">DELETE</button>
                            </div>
                        </div>
                    </div>
                </details>

                <button class="btn-main" id="saveBtn">RENDER & SAVE PNG</button>
                <button class="btn-dim" id="resetBtn">SYSTEM RESET</button>
            </div>
        </div>
    </div>

    <script>
        const archList = { "ARCH-PRIMA": ["헬리오스", "해일", "이카로스", "산타"], "VANGUARD - 1": ["애쉬", "노아", "아모레", "셰인", "오버로드", "라임"], "VANGUARD - 2": ["신드롬", "바이브", "리암"], "AGENT": ["카토", "샤드", "블루"], "ACOLYTE": ["블루", "피카"], "CORE": ["닥터 밴스", "퓨어"], "R.S.T.": ["휴고", "저스티스", "에덴", "카르마"], "SUPPORT": ["오아시스", "자이안", "페더", "스트레이", "윈터", "부스터", "코드"] };
        const cap = document.getElementById('capture-area'), wrapper = document.getElementById('preview-wrapper'), editor = document.getElementById('editor');
        const catSel = document.getElementById('catSel'), charSel = document.getElementById('charSel');
        const displayTitle = document.getElementById('display-title'), displayWatermark = document.getElementById('display-watermark');
        const ratioSel = document.getElementById('ratioSel'), themeSel = document.getElementById('themeSel'), fontSel = document.getElementById('fontSel'), sizeSlide = document.getElementById('sizeSlide');
        const padSlide = document.getElementById('padSlide'), radSlide = document.getElementById('radSlide'), blurSlide = document.getElementById('blurSlide');
        const bgImg = document.getElementById('bgImg'), dCanvas = document.getElementById('drawing-canvas'), dCtx = dCanvas.getContext('2d');
        const c1 = document.getElementById('c1'), c2 = document.getElementById('c2'), c3 = document.getElementById('c3'), c4 = document.getElementById('c4');
        
        let isCustomMode = false;
        const customToggleBtn = document.getElementById('customToggleBtn');
        const presetMode = document.getElementById('preset-mode');
        const customMode = document.getElementById('custom-mode');
        const customCat = document.getElementById('customCat'), customChar = document.getElementById('customChar'), customCreator = document.getElementById('customCreator');
        
        let drawMode = false, isDrawing = false, curZ = 50, rawBgImageSrc = null;

        let savedRange = null;
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
                savedRange = sel.getRangeAt(0);
            }
        });

        function exec(cmd, val = null) {
            editor.focus();
            if (savedRange) { const s = window.getSelection(); s.removeAllRanges(); s.addRange(savedRange); }
            document.execCommand('styleWithCSS', false, true); 
            if(cmd === 'backColor' && val) document.execCommand('hiliteColor', false, val);
            document.execCommand(cmd, false, val);
        }

        const bindFmt = (id, cmd, val) => {
            const btn = document.getElementById(id);
            const handler = (e) => { e.preventDefault(); exec(cmd, val); };
            btn.addEventListener('mousedown', handler);
            btn.addEventListener('touchstart', handler, {passive: false});
        };

        bindFmt('bBtn', 'bold');
        bindFmt('iBtn', 'italic');
        bindFmt('uBtn', 'underline');
        bindFmt('alignLeftBtn', 'justifyLeft');
        bindFmt('alignCenterBtn', 'justifyCenter');
        bindFmt('alignRightBtn', 'justifyRight');
        bindFmt('removeHiBtn', 'backColor', 'transparent');

        const hlColorInput = document.getElementById('hlColor');
        const hiBtn = document.getElementById('hiBtn');
        
        const applyHighlight = (e) => {
            e.preventDefault();
            const hex = hlColorInput.value;
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            exec('backColor', `rgba(${r}, ${g}, ${b}, 0.4)`);
        };
        hiBtn.addEventListener('mousedown', applyHighlight);
        hiBtn.addEventListener('touchstart', applyHighlight, {passive: false});
        
        hlColorInput.addEventListener('input', (e) => { hiBtn.style.color = e.target.value; });
        document.getElementById('fColor').addEventListener('input', (e) => { exec('foreColor', e.target.value); });

        customToggleBtn.onclick = () => {
            isCustomMode = !isCustomMode;
            customToggleBtn.innerText = isCustomMode ? "CUSTOM ON" : "CUSTOM OFF";
            customToggleBtn.style.background = isCustomMode ? "rgba(255,255,255,0.1)" : "transparent";
            customToggleBtn.style.color = isCustomMode ? "#fff" : "var(--text)";
            presetMode.style.display = isCustomMode ? 'none' : 'grid';
            customMode.style.display = isCustomMode ? 'flex' : 'none';
            render();
        };

        [customCat, customChar, customCreator].forEach(el => el.addEventListener('input', render));

        const stickerInput = document.getElementById('stickerFile');
        stickerInput.addEventListener('change', function(e) {
            const file = e.target.files[0]; 
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { createSticker(ev.target.result); };
            reader.readAsDataURL(file);
            setTimeout(() => { e.target.value = ''; }, 100);
        });

        function createSticker(src) {
            const stk = document.createElement('div'); stk.className = 'sticker';
            stk.style.left = '200px'; stk.style.top = '200px'; stk.style.zIndex = ++curZ;
            stk.innerHTML = `<img src="${src}">
                <div class="sticker-ctrl sticker-del"><i class="fa-solid fa-xmark"></i></div>
                <div class="sticker-ctrl sticker-resize"><i class="fa-solid fa-arrows-left-right"></i></div>
                <div class="sticker-ctrl sticker-up"><i class="fa-solid fa-angles-up"></i></div>
                <div class="sticker-ctrl sticker-down"><i class="fa-solid fa-angles-down"></i></div>`;
            cap.appendChild(stk);
            
            const bindBtn = (sel, fn) => {
                const btn = stk.querySelector(sel);
                const h = (e) => { e.stopPropagation(); e.preventDefault(); fn(); };
                btn.addEventListener('mousedown', h); btn.addEventListener('touchstart', h, {passive: false});
            };
            bindBtn('.sticker-del', () => stk.remove());
            bindBtn('.sticker-up', () => stk.style.zIndex = ++curZ);
            bindBtn('.sticker-down', () => stk.style.zIndex = Math.max(2, parseInt(stk.style.zIndex)-1));
            
            initStickerInteractions(stk);
        }

        function initStickerInteractions(stk) {
            let isM = false, isR = false, sX, sY, sL, sA, sScale = 1, sRot = 0, center = {};
            
            const startMove = (e) => {
                if(drawMode || e.target.classList.contains('sticker-ctrl')) return;
                e.stopPropagation(); document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
                stk.classList.add('sticker-active'); isM = true; 
                sX = e.clientX || e.touches[0].clientX; sY = e.clientY || e.touches[0].clientY;
                if(e.pointerId) stk.setPointerCapture(e.pointerId);
            };
            stk.addEventListener('mousedown', startMove); stk.addEventListener('touchstart', startMove, {passive: false});

            const startResize = (e) => {
                e.stopPropagation(); e.preventDefault(); isR = true;
                const pR = cap.getBoundingClientRect(), s = 1080/pR.width, rect = stk.getBoundingClientRect();
                center = { x: (rect.left + rect.width/2 - pR.left)*s, y: (rect.top + rect.height/2 - pR.top)*s };
                sX = ((e.clientX || e.touches[0].clientX) - pR.left)*s; sY = ((e.clientY || e.touches[0].clientY) - pR.top)*s;
                sL = Math.hypot(sX - center.x, sY - center.y); sA = Math.atan2(sY - center.y, sX - center.x);
                const tr = window.getComputedStyle(stk).transform;
                if(tr !== 'none') { const v = tr.split('(')[1].split(')')[0].split(','); sRot = Math.atan2(v[1], v[0]); sScale = Math.sqrt(v[0]*v[0] + v[1]*v[1]); }
            };
            const rBtn = stk.querySelector('.sticker-resize');
            rBtn.addEventListener('mousedown', startResize); rBtn.addEventListener('touchstart', startResize, {passive: false});

            const onMove = (e) => {
                if(!isM && !isR) return;
                const pR = cap.getBoundingClientRect(), s = 1080/pR.width;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if(isM) { 
                    e.preventDefault();
                    stk.style.left = (parseFloat(stk.style.left || 0) + (clientX - sX)*s) + 'px'; 
                    stk.style.top = (parseFloat(stk.style.top || 0) + (clientY - sY)*s) + 'px'; 
                    sX = clientX; sY = clientY; 
                }
                if(isR) {
                    e.preventDefault();
                    const cX = (clientX - pR.left)*s, cY = (clientY - pR.top)*s;
                    stk.style.transform = `scale(${(Math.hypot(cX - center.x, cY - center.y) / sL) * sScale}) rotate(${((Math.atan2(cY - center.y, cX - center.x) - sA) + sRot) * (180/Math.PI)}deg)`;
                }
            };
            window.addEventListener('mousemove', onMove); window.addEventListener('touchmove', onMove, {passive: false});
            
            const onEnd = () => { isM = false; isR = false; };
            window.addEventListener('mouseup', onEnd); window.addEventListener('touchend', onEnd);
        }

        function render() {
            const t = themeSel.value; cap.className = 'theme-' + t;
            
            document.querySelectorAll('.y2k-item, .diary-item, .sf-item').forEach(el => el.style.display = 'none');
            document.getElementById('c3-box').style.display = 'none'; document.getElementById('c4-box').style.display = 'none';

            if(t === 'y2k') { 
                document.querySelectorAll('.y2k-item').forEach(el => el.style.display = 'flex'); 
                document.getElementById('c3-box').style.display = 'flex'; document.getElementById('c4-box').style.display = 'flex'; 
            }
            if(t === 'diary') document.querySelectorAll('.diary-item').forEach(el => el.style.display = 'flex');
            if(t === 'sf') document.querySelectorAll('.sf-item').forEach(el => el.style.display = 'block');
            if(t === 'polaroid') { document.getElementById('c4-box').style.display = 'flex'; }

            cap.style.setProperty('--c1', c1.value); cap.style.setProperty('--c2', c2.value);
            cap.style.setProperty('--c3', c3.value); cap.style.setProperty('--c4', c4.value);
            cap.style.setProperty('--pad', padSlide.value + 'px'); cap.style.setProperty('--rad', radSlide.value + 'px');
            
            if(isCustomMode) {
                const cCatText = customCat.value || 'UNKNOWN';
                const cCharText = customChar.value || 'UNKNOWN';
                displayTitle.innerText = `${cCatText} | ${cCharText}`;
                displayWatermark.innerText = customCreator.value || 'SAMPLE';
            } else {
                displayTitle.innerText = `${catSel.value} | ${charSel.value}`;
                displayWatermark.innerText = `ARCH @체리망고`;
            }

            displayTitle.style.fontFamily = fontSel.value;
            displayWatermark.style.fontFamily = fontSel.value;
            editor.style.fontFamily = fontSel.value; editor.style.fontSize = sizeSlide.value + 'px';
            
            if(t === 'y2k' || t === 'diary' || t === 'polaroid') cap.style.setProperty('--editor-color', '#000000'); 
            else cap.style.setProperty('--editor-color', '#ffffff');
            
            const txtBody = document.getElementById('text-body') || document.getElementById('y2k-screen-wrap');
            if(t === 'y2k') { txtBody.id="text-body"; txtBody.className="y2k-screen"; txtBody.style.padding='var(--pad, 50px)'; } 
            else { txtBody.id="text-body"; txtBody.className=""; txtBody.style.padding='0'; }

            applyBlurToBg();
        }

        function applyBlurToBg() {
            if(!rawBgImageSrc) { bgImg.style.display = 'none'; return; }
            bgImg.style.display = 'block';
            if(blurSlide.value == 0) { bgImg.style.backgroundImage = `url(${rawBgImageSrc})`; return; }

            const img = new Image(); img.crossOrigin = "Anonymous";
            img.onload = () => {
                const c = document.createElement('canvas'); c.width = img.width; c.height = img.height; const ctx = c.getContext('2d');
                ctx.filter = `blur(${blurSlide.value * (img.width/1080)}px)`; ctx.drawImage(img, 0, 0);
                bgImg.style.backgroundImage = `url(${c.toDataURL()})`;
            };
            img.src = rawBgImageSrc;
        }

        const bgInput = document.getElementById('bgFile');
        bgInput.addEventListener('change', function(e) {
            const file = e.target.files[0]; if(!file) return;
            const r = new FileReader(); 
            r.onload = (ev) => { rawBgImageSrc = ev.target.result; render(); }; 
            r.readAsDataURL(file);
            setTimeout(() => { e.target.value = ''; }, 100);
        });
        document.getElementById('delBgBtn').onclick = () => { rawBgImageSrc = null; bgImg.style.backgroundImage = "none"; render(); };

        const r19Btn = document.getElementById('r19Btn');
        const r19Toggle = document.getElementById('r19Toggle');
        r19Btn.onclick = () => {
            r19Toggle.classList.toggle('active');
            document.getElementById('r19-badge').style.display = r19Toggle.classList.contains('active') ? 'flex' : 'none';
        };

        drawBtn.onclick = () => { drawMode = !drawMode; drawBtn.innerText = drawMode ? "PEN ON" : "PEN OFF"; drawBtn.classList.toggle('active', drawMode); dCanvas.style.pointerEvents = drawMode ? "auto" : "none"; };
        
        const startDraw = (e) => {
            if(!drawMode) return; isDrawing = true; e.preventDefault();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const r = dCanvas.getBoundingClientRect(), s = 1080/r.width; 
            dCtx.beginPath(); dCtx.moveTo((clientX-r.left)*s, (clientY-r.top)*s); 
            dCtx.strokeStyle = document.getElementById('penColor').value; 
            dCtx.lineWidth = parseInt(document.getElementById('penSize').value); 
            dCtx.lineCap="round"; dCtx.lineJoin="round"; 
        };
        dCanvas.addEventListener('mousedown', startDraw); dCanvas.addEventListener('touchstart', startDraw, {passive: false});

        const moveDraw = (e) => {
            if(!isDrawing) return; e.preventDefault();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            const r = dCanvas.getBoundingClientRect(), s = 1080/r.width; 
            dCtx.lineTo((clientX-r.left)*s, (clientY-r.top)*s); dCtx.stroke(); 
        };
        dCanvas.addEventListener('mousemove', moveDraw); dCanvas.addEventListener('touchmove', moveDraw, {passive: false});
        
        const endDraw = () => isDrawing = false;
        window.addEventListener('mouseup', endDraw); window.addEventListener('touchend', endDraw);
        document.getElementById('clearBtn').onclick = () => { if(confirm("낙서를 모두 지우겠습니까? (Clear Canvas?)")) dCtx.clearRect(0,0,1080,1080); };
        
        for(let c in archList) catSel.add(new Option(c, c));
        catSel.onchange = () => { charSel.innerHTML = ""; archList[catSel.value].forEach(n => charSel.add(new Option(n, n))); render(); };
        document.getElementById('manualBtn').onclick = () => alert("모바일에서 앱을 설치한 후 케이브덕에서 발췌하고 싶은 문장을 복사>공유하기를 눌러 발췌 앱으로 이동가능합니다. 이 앱이 도움이 되었다면 산타, 페더와 많은 대화 부탁드립니다... 아크의 모두가 1M을 찍는 그날까지...S2");
        document.getElementById('resetBtn').onclick = () => { if(confirm("초기화하시겠습니까?")) { location.reload(); } };
        document.querySelectorAll('input:not(#fColor), input:not(#hlColor), select').forEach(el => { el.oninput = (el.id === 'ratioSel' || el.id === 'themeSel') ? () => { updateLayout(); render(); } : render; });
        
        function updateLayout() {
            const w = 1080, h = ratioSel.value === '1:1' ? 1080 : 1920;
            const b = document.createElement('canvas'); b.width = dCanvas.width; b.height = dCanvas.height; b.getContext('2d').drawImage(dCanvas,0,0);
            cap.style.width = w + 'px'; cap.style.height = h + 'px'; dCanvas.width = w; dCanvas.height = h; dCtx.drawImage(b,0,0);
            const sc = wrapper.clientWidth / w; cap.style.transform = `scale(${sc})`; wrapper.style.height = (h*sc) + 'px';
        }
        window.onresize = updateLayout; 
        
        window.onload = () => { 
            updateLayout(); render(); 
            const parsedUrl = new URL(window.location.href);
            const sharedText = parsedUrl.searchParams.get('text') || parsedUrl.searchParams.get('title');
            if (sharedText) { editor.innerHTML = decodeURIComponent(sharedText).replace(/\n/g, '<br>'); }
        };

        document.getElementById('saveBtn').onclick = () => {
            document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
            const oldT = cap.style.transform; cap.style.transform = 'scale(1)'; 
            setTimeout(() => {
                html2canvas(cap, { scale: 1, useCORS: true, allowTaint: true }).then(canvas => {
                    cap.style.transform = oldT; const a = document.createElement('a'); a.download = `ARCH_EXCERPT_${Date.now()}.png`; a.href = canvas.toDataURL(); a.click();
                });
            }, 150);
        };
    </script>
</body>
</html>
