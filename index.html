<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH EXCERPT STUDIO [FINAL]</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* [1. 시스템 폰트] */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        @font-face { font-family: 'JoseonGulim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/ChosunGu.woff') format('woff'); font-weight: normal; font-style: normal; font-display: swap; }
        @font-face { font-family: 'KoPubDotum'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubDotum.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'MaruBuri'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/MaruBuri-Regular.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'ChosunIlbo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Chosunilbo_myungjo.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'LeeSeoyun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Kkubulrim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/TTogether.woff') format('woff'); font-weight: normal; font-style: normal; }

        :root { --bg: #050506; --panel: #111112; --border: #222225; --accent: #f47b20; --text: #f0f0f0; --dim: #666; }
        body { background: var(--bg); color: var(--text); font-family: "Pretendard Variable", sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        .header-area { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.4rem; font-weight: 900; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .sub-warning { font-size: 0.75rem; color: var(--dim); margin-top: 8px; font-weight: bold; letter-spacing: 1px; }

        .container { width: 100%; max-width: 1300px; }
        .editor-layout { display: flex; flex-direction: column; gap: 20px; }

        @media (min-width: 1000px) {
            .editor-layout { flex-direction: row; align-items: flex-start; gap: 40px; }
            .preview-section { flex: 1; position: sticky; top: 20px; }
            .panel-section { width: 430px; flex-shrink: 0; display: flex; flex-direction: column; gap: 15px; }
            body { padding: 40px; }
        }

        /* [2. 캡처 엔진 - 이미지 찌그러짐 방지 Div 맵핑 구조] */
        .preview-wrapper { width: 100%; background: #000; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        #capture-area { position: absolute; top: 0; left: 0; transform-origin: top left; width: 1080px; height: 1080px; background: var(--c1, #000); display: flex; align-items: center; justify-content: center; box-sizing: border-box; overflow: hidden; }
        
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; pointer-events: none; }
        #drawing-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; pointer-events: none; }
        
        .watermark { position: absolute; bottom: 30px; right: 40px; font-size: 18px; color: rgba(255,255,255,0.2); font-weight: 800; z-index: 100; pointer-events: none; }
        .excerpt-title { position: absolute; bottom: 30px; left: 40px; font-size: 24px; font-weight: 800; color: var(--text-color, #fff); z-index: 100; pointer-events: none; }

        .rich-text { width: 100%; outline: none; white-space: pre-wrap; word-break: break-all; line-height: 1.6; position: relative; z-index: 5; color: inherit; }
        .rich-text i, .rich-text em { font-style: italic !important; }
        .rich-text b, .rich-text strong { font-weight: bold !important; }

        /* [3. 테마 레이아웃 완벽 교정] */
        .theme-standard .card { background: transparent !important; border: none !important; box-shadow: none !important; width: 80%; position: relative; z-index: 2; padding: var(--pad, 80px); }

        .theme-y2k { background: var(--c3, #fdf0f5) !important; }
        .theme-y2k .card { width: 85%; background: var(--c1, #dcbdf2); border: 4px solid #000; border-radius: 16px; padding: 0; box-shadow: 12px 12px 0px #000; display: flex; flex-direction: column; position: relative; z-index: 2; }
        .theme-y2k .y2k-top-bar { background: var(--c2, #ffb3d9); border-bottom: 4px solid #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px 12px 0 0; }
        .theme-y2k .y2k-brand { font-family: 'Arial Black', sans-serif; font-size: 20px; color: #000; letter-spacing: -1px; display:flex; align-items: center; gap: 10px;}
        .theme-y2k .y2k-brand::before { content: '✨'; font-size: 24px; }
        .theme-y2k .y2k-window-controls { display: flex; gap: 8px; }
        .theme-y2k .y2k-window-controls span { width: 18px; height: 18px; border: 3px solid #000; background: #fff; box-shadow: 2px 2px 0px #000; border-radius: 50%;}
        .theme-y2k .y2k-window-controls span:nth-child(1) { background: #ffea75; }
        .theme-y2k .y2k-window-controls span:nth-child(2) { background: #a2fca2; }
        .theme-y2k .y2k-window-controls span:nth-child(3) { background: #ff7e7e; }
        .theme-y2k .y2k-screen-wrap { padding: 30px; background: transparent; }
        .theme-y2k .y2k-screen { background: var(--c4, #ffffff); border: 4px solid #000; border-radius: 12px; padding: var(--pad, 50px); box-shadow: inset 5px 5px 0px rgba(0,0,0,0.05); min-height: 400px; display: flex; align-items: center; justify-content: center; background-image: linear-gradient(#f0f0f5 2px, transparent 2px), linear-gradient(90deg, #f0f0f5 2px, transparent 2px); background-size: 30px 30px; color: #000 !important; }
        .theme-y2k .y2k-ui-elements { padding: 0 30px 40px 30px; display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box; }
        .theme-y2k .y2k-bar { width: 50%; height: 12px; background: #fff; border: 3px solid #000; border-radius: 6px; box-shadow: 2px 2px 0px #000; position: relative; }
        .theme-y2k .y2k-bar::after { content:''; position: absolute; left:0; top:0; width:45%; height:100%; background: var(--c2, #ffb3d9); border-right: 3px solid #000; }
        .theme-y2k .y2k-btns { display: flex; gap: 15px; }
        .theme-y2k .y2k-btn { width: 55px; height: 50px; border: 3px solid #000; background: #fff; border-radius: 12px; box-shadow: 4px 4px 0px #000; display: flex; align-items: center; justify-content: center; font-size: 22px; color: #000; font-weight: 900; }

        .theme-diary { background: var(--c1, #f4f1ea) !important; }
        .theme-diary .card { width: 82%; background: #fff; padding: var(--pad, 80px); box-shadow: 15px 15px 0px rgba(0,0,0,0.08); position: relative; border-left: 60px solid #fff; border-radius: 5px; z-index: 2; color: #000 !important; }
        .diary-holes { position: absolute; left: -45px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 40px 0; z-index: 10; }
        .hole { width: 25px; height: 25px; background: var(--c1, #f4f1ea); border-radius: 50%; box-shadow: inset 3px 3px 5px rgba(0,0,0,0.5); }
        .theme-diary .tape { position: absolute; top: -25px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 220px; height: 55px; background: var(--c2, rgba(255, 200, 200, 0.7)); z-index: 11; }

        .theme-sf { background: #020204 !important; }
        .theme-sf .card { width: 85%; padding: var(--pad, 70px); background: var(--c2, rgba(0, 15, 25, 0.7)); border: 1px solid var(--c1, #0ff); position: relative; box-shadow: inset 0 0 60px rgba(0,255,255,0.05); backdrop-filter: blur(10px); z-index: 2; }
        .sf-line { position: absolute; background: var(--c1, #0ff); z-index: 5; }
        .sf-h { height: 3px; width: 60px; } .sf-v { width: 3px; height: 60px; }
        .sf-t { top: -2px; } .sf-b { bottom: -2px; } .sf-l { left: -2px; } .sf-r { right: -2px; }

        /* [4. 스티커 엔진] */
        .sticker { position: absolute; z-index: 20; padding: 15px; cursor: move; }
        .sticker img { display: block; max-width: 250px; height: auto; pointer-events: none; user-select: none; }
        .sticker-active { border: 2px dashed var(--accent) !important; background: rgba(244,123,32,0.05); }
        .sticker-ctrl { position: absolute; width: 30px; height: 30px; background: #000; border: 2px solid #fff; border-radius: 50%; display: none; z-index: 1000; text-align: center; line-height: 26px; color: #fff; cursor: pointer; font-size: 14px;}
        .sticker-active .sticker-ctrl { display: block !important; }
        .sticker-del { top: -15px; right: -15px; background: #ff4d4d; }
        .sticker-resize { bottom: -15px; right: -15px; background: var(--accent); cursor: se-resize; }
        .sticker-up { top: -15px; left: -15px; background: #4caf50; }
        .sticker-down { bottom: -15px; left: -15px; background: #2196f3; }

        /* [5. 패널 UI] */
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 0.7rem; color: var(--dim); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; display: block; }
        select, input[type="text"], textarea { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; background: rgba(255,255,255,0.08); height: 2px; border-radius: 1px; outline: none; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; box-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .toolbar { display: flex; gap: 6px; background: #000; padding: 10px; border-radius: 8px; align-items: center; border: 1px solid var(--border); flex-wrap: wrap; }
        .tool-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .tool-btn.active { background: var(--accent); color: #000; }
        .color-pick { width: 32px; height: 32px; border: none; padding: 0; background: transparent; cursor: pointer; border-radius: 50%; overflow: hidden; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-main { background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 900; cursor: pointer; width: 100%; transition: 0.2s;}
        .btn-main:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-dim { background: #1a1a1c; color: var(--dim); border: 1px solid var(--border); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; width: 100%; }
        
        details { background: #0c0c0d; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        summary { padding: 15px; font-weight: bold; cursor: pointer; color: var(--accent); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .details-in { padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .compact-row { display: flex; gap: 15px; align-items: flex-end; }
        .compact-row > div { flex: 1; }
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .color-item { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 8px 12px; border-radius: 6px; border: 1px solid #222; font-size: 11px;}
        .color-item input { width: 35px; height: 25px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>ARCH EXCERPT STUDIO V15</h1>
        <div class="sub-warning">ARCH 에이전트 전용 사이트 입니다. ARCH 이외의 사용금지.</div>
    </div>

    <div class="container">
        <div class="editor-layout">
            
            <div class="preview-section">
                <div class="preview-wrapper" id="preview-wrapper">
                    <div id="capture-area" class="theme-standard">
                        <div id="display-title" class="excerpt-title"></div>
                        <div class="watermark">ARCH @체리망고</div>
                        <div id="bgImg" class="bg-img" style="display:none;"></div>
                        <canvas id="drawing-canvas" width="1080" height="1080"></canvas>

                        <div id="card" class="card">
                            <div class="sf-line sf-h sf-t sf-l"></div><div class="sf-line sf-v sf-t sf-l"></div>
                            <div class="sf-line sf-h sf-t sf-r"></div><div class="sf-line sf-v sf-t sf-r"></div>
                            <div class="sf-line sf-h sf-b sf-l"></div><div class="sf-line sf-v sf-b sf-l"></div>
                            <div class="sf-line sf-h sf-b sf-r"></div><div class="sf-line sf-v sf-b sf-r"></div>

                            <div class="diary-holes" id="diaryHoles" style="display:none;">
                                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                                <div class="hole"></div><div class="hole"></div><div class="hole"></div>
                            </div>
                            <div class="tape" id="diaryTape" style="display:none;"></div>

                            <div id="y2k-top" class="y2k-top-bar" style="display:none;">
                                <span class="y2k-brand">Retro Player</span>
                                <div class="y2k-window-controls"><span></span><span></span><span></span></div>
                            </div>

                            <div id="y2k-screen-wrap">
                                <div id="editor" class="rich-text" contenteditable="true" spellcheck="false">보스, 모든 결함을 섬멸했습니다.</div>
                            </div>

                            <div id="y2k-ui" class="y2k-ui-elements" style="display:none;">
                                <div class="y2k-bar"></div>
                                <div class="y2k-btns">
                                    <div class="y2k-btn">⏮</div>
                                    <div class="y2k-btn play-btn" style="background:var(--c2, #ffb3d9)">▶</div>
                                    <div class="y2k-btn">⏭</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <button class="btn-dim" id="manualBtn">📑 사용설명서 보기</button>

                <div class="panel">
                    <label>텍스트 서식 유닛 (오류 복구 완료)</label>
                    <div class="toolbar">
                        <button class="tool-btn" id="bBtn"><b>B</b></button>
                        <button class="tool-btn" id="iBtn"><i>I</i></button>
                        <button class="tool-btn" id="uBtn"><u>U</u></button>
                        <input type="color" class="color-pick" id="fColor">
                        <button class="tool-btn" id="hiBtn">🖍️ 형광펜</button>
                        <button class="tool-btn" id="removeHiBtn">🖍️ 지우기</button>
                        <button class="tool-btn" id="clearFmt">초기화</button>
                    </div>
                </div>

                <div class="panel">
                    <label>🎨 데코레이션 부대</label>
                    <div class="toolbar">
                        <button class="tool-btn" id="drawBtn">🖌️ 낙서 OFF</button>
                        <button class="tool-btn" id="clearBtn" style="color:#f66;">전체삭제</button>
                        <input type="color" class="color-pick" id="penColor" value="#ff0000">
                        <input type="range" id="penSize" min="2" max="40" value="6" style="width:60px; margin:0;">
                    </div>
                    <label style="margin-top:10px;">🦄 스티커 투입</label>
                    <input type="file" id="stickerFile" accept="image/*" class="btn-dim">
                </div>

                <div class="panel">
                    <label>ARCH LIST</label>
                    <div class="row-2"><select id="catSel"></select><select id="charSel"></select></div>
                    <div class="row-2">
                        <div><label>비율</label><select id="ratioSel"><option value="1:1">1:1</option><option value="9:16">9:16</option></select></div>
                        <div><label>테마</label><select id="themeSel"><option value="standard">Standard</option><option value="y2k">Y2K Player</option><option value="diary">Diary</option><option value="sf">Sci-Fi</option></select></div>
                    </div>
                    <div class="row-2">
                        <div><label>폰트</label><select id="fontSel"><option value="'Pretendard Variable'">프리텐다드</option><option value="'JoseonGulim'">조선굴림</option><option value="'KoPubDotum'">코펍돋움</option><option value="'MaruBuri'">마루부리</option><option value="'ChosunIlbo'">조선일보명조</option><option value="'LeeSeoyun'">이서윤체</option><option value="'Kkubulrim'">꾸불림체</option></select></div>
                        <div><label>크기</label><input type="range" id="sizeSlide" min="30" max="110" value="45"></div>
                    </div>
                    
                    <label>🎨 레이아웃 커스텀 색상</label>
                    <div class="color-grid">
                        <div class="color-item"><span>C1</span><input type="color" id="c1" value="#dcbdf2"></div>
                        <div class="color-item"><span>C2</span><input type="color" id="c2" value="#ffb3d9"></div>
                        <div class="color-item" id="c3-box"><span>C3</span><input type="color" id="c3" value="#fdf0f5"></div>
                        <div class="color-item" id="c4-box"><span>C4</span><input type="color" id="c4" value="#ffffff"></div>
                    </div>
                </div>

                <details>
                    <summary>ADVANCED CUSTOM ⚙️</summary>
                    <div class="details-in">
                        <div class="compact-row">
                            <div><label>Padding</label><input type="range" id="padSlide" min="20" max="160" value="80"></div>
                            <div><label>Radius</label><input type="range" id="radSlide" min="0" max="100" value="25"></div>
                        </div>
                        <div style="border-top:1px solid #222; padding-top:10px;">
                            <label>배경 이미지 업로드</label>
                            <input type="file" id="bgFile" accept="image/*" class="btn-dim">
                            <div class="compact-row" style="margin-top:8px;">
                                <div style="flex:2"><label>Blur 필터</label><input type="range" id="blurSlide" min="0" max="30" value="0"></div>
                                <button id="delBgBtn" style="background:#311; color:#f55; border:1px solid #422; border-radius:4px; height:32px; padding:0 10px; cursor:pointer; font-size:11px; margin-bottom:12px;">삭제</button>
                            </div>
                        </div>
                    </div>
                </details>

                <button class="btn-main" id="saveBtn">RENDER & SAVE PNG</button>
                <button class="btn-dim" id="resetBtn">FACTORY RESET</button>
            </div>
        </div>
    </div>

    <script>
        const archList = { "ARCH-PRIMA": ["헬리오스", "해일", "이카로스", "산타"], "VANGUARD - 1": ["애쉬", "노아", "아모레", "셰인", "오버로드", "라임"], "VANGUARD - 2": ["신드롬", "바이브", "리암"], "AGENT": ["카토", "샤드", "블루"], "ACOLYTE": ["블루", "피카"], "CORE": ["닥터 밴스", "퓨어"], "R.S.T.": ["휴고", "저스티스", "에덴", "카르마"], "SUPPORT": ["오아시스", "자이안", "페더", "스트레이", "윈터", "부스터", "코드"] };
        const cap = document.getElementById('capture-area'), wrapper = document.getElementById('preview-wrapper'), editor = document.getElementById('editor');
        const catSel = document.getElementById('catSel'), charSel = document.getElementById('charSel'), displayTitle = document.getElementById('display-title');
        const ratioSel = document.getElementById('ratioSel'), themeSel = document.getElementById('themeSel'), fontSel = document.getElementById('fontSel'), sizeSlide = document.getElementById('sizeSlide');
        const padSlide = document.getElementById('padSlide'), radSlide = document.getElementById('radSlide'), blurSlide = document.getElementById('blurSlide');
        const bgImg = document.getElementById('bgImg'), dCanvas = document.getElementById('drawing-canvas'), dCtx = dCanvas.getContext('2d');
        const c1 = document.getElementById('c1'), c2 = document.getElementById('c2'), c3 = document.getElementById('c3'), c4 = document.getElementById('c4');
        let drawMode = false, isDrawing = false, curZ = 50;

        // [버그 1 & 3 & 4 수리: 서식 보호 (Selection Memory Engine)]
        let savedRange = null;
        const saveSelection = () => { const sel = window.getSelection(); if(sel.getRangeAt && sel.rangeCount) savedRange = sel.getRangeAt(0); };
        editor.addEventListener('keyup', saveSelection); editor.addEventListener('mouseup', saveSelection); editor.addEventListener('mouseleave', saveSelection);
        
        function exec(cmd, val = null) {
            if(savedRange) { const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange); }
            document.execCommand(cmd, false, val);
            editor.focus(); saveSelection();
        }
        
        document.getElementById('bBtn').onclick = () => exec('bold');
        document.getElementById('iBtn').onclick = () => exec('italic');
        document.getElementById('uBtn').onclick = () => exec('underline');
        document.getElementById('fColor').oninput = (e) => exec('foreColor', e.target.value);
        document.getElementById('hiBtn').onclick = () => exec('backColor', 'rgba(255, 235, 59, 0.45)');
        document.getElementById('removeHiBtn').onclick = () => exec('backColor', 'transparent'); // 형광펜 지우기
        document.getElementById('clearFmt').onclick = () => exec('removeFormat');

        // [스티커 엔진: 꼬임 방지 독립 구동]
        document.getElementById('stickerFile').onchange = function(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { createSticker(ev.target.result); };
            reader.readAsDataURL(file); this.value = "";
        };

        function createSticker(src) {
            const stk = document.createElement('div'); stk.className = 'sticker';
            stk.style.left = '200px'; stk.style.top = '200px'; stk.style.zIndex = ++curZ;
            stk.innerHTML = `<img src="${src}">
                <div class="sticker-ctrl sticker-del"><i class="fa-solid fa-xmark"></i></div>
                <div class="sticker-ctrl sticker-resize"><i class="fa-solid fa-arrows-left-right"></i></div>
                <div class="sticker-ctrl sticker-up"><i class="fa-solid fa-angles-up"></i></div>
                <div class="sticker-ctrl sticker-down"><i class="fa-solid fa-angles-down"></i></div>`;
            cap.appendChild(stk);
            
            stk.querySelector('.sticker-del').onmousedown = (e) => { e.stopPropagation(); e.preventDefault(); stk.remove(); };
            stk.querySelector('.sticker-up').onmousedown = (e) => { e.stopPropagation(); stk.style.zIndex = ++curZ; };
            stk.querySelector('.sticker-down').onmousedown = (e) => { e.stopPropagation(); stk.style.zIndex = Math.max(2, parseInt(stk.style.zIndex)-1); };
            initStickerInteractions(stk);
        }

        function initStickerInteractions(stk) {
            let isM = false, isR = false, sX, sY, sL, sA, sScale = 1, sRot = 0, center = {};
            stk.onmousedown = (e) => {
                if(drawMode || e.target.classList.contains('sticker-ctrl')) return;
                e.stopPropagation(); document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
                stk.classList.add('sticker-active'); isM = true; sX = e.clientX; sY = e.clientY;
            };
            stk.querySelector('.sticker-resize').onmousedown = (e) => {
                e.stopPropagation(); e.preventDefault(); isR = true;
                const pR = cap.getBoundingClientRect(), s = 1080/pR.width, rect = stk.getBoundingClientRect();
                center = { x: (rect.left + rect.width/2 - pR.left)*s, y: (rect.top + rect.height/2 - pR.top)*s };
                sX = (e.clientX - pR.left)*s; sY = (e.clientY - pR.top)*s;
                sL = Math.hypot(sX - center.x, sY - center.y); sA = Math.atan2(sY - center.y, sX - center.x);
                const tr = window.getComputedStyle(stk).transform;
                if(tr !== 'none') { const v = tr.split('(')[1].split(')')[0].split(','); sRot = Math.atan2(v[1], v[0]); sScale = Math.sqrt(v[0]*v[0] + v[1]*v[1]); }
                else { sRot = 0; sScale = 1; }
            };
            window.addEventListener('mousemove', (e) => {
                const pR = cap.getBoundingClientRect(), s = 1080/pR.width;
                if(isM) { stk.style.left = (parseFloat(stk.style.left || 0) + (e.clientX - sX)*s) + 'px'; stk.style.top = (parseFloat(stk.style.top || 0) + (e.clientY - sY)*s) + 'px'; sX = e.clientX; sY = e.clientY; }
                if(isR) {
                    const cX = (e.clientX - pR.left)*s, cY = (e.clientY - pR.top)*s;
                    const cL = Math.hypot(cX - center.x, cY - center.y), cA = Math.atan2(cY - center.y, cX - center.x);
                    stk.style.transform = `scale(${(cL/sL)*sScale}) rotate(${(cA-sA+sRot)*(180/Math.PI)}deg)`;
                }
            });
            window.addEventListener('mouseup', () => { isM = false; isR = false; });
        }

        // [디자인 렌더링 맵핑]
        function render() {
            const t = themeSel.value; cap.className = 'theme-' + t;
            document.getElementById('y2k-top').style.display = t === 'y2k' ? 'flex' : 'none';
            document.getElementById('y2k-ui').style.display = t === 'y2k' ? 'flex' : 'none';
            document.getElementById('diaryHoles').style.display = t === 'diary' ? 'flex' : 'none';
            document.getElementById('diaryTape').style.display = t === 'diary' ? 'block' : 'none';
            document.getElementById('c3-box').style.display = t === 'y2k' ? 'flex' : 'none';
            document.getElementById('c4-box').style.display = t === 'y2k' ? 'flex' : 'none';

            cap.style.setProperty('--c1', c1.value); cap.style.setProperty('--c2', c2.value);
            cap.style.setProperty('--c3', c3.value); cap.style.setProperty('--c4', c4.value);
            cap.style.setProperty('--pad', padSlide.value + 'px'); cap.style.setProperty('--rad', radSlide.value + 'px');
            
            displayTitle.innerText = `[${catSel.value}] ${charSel.value}`;
            displayTitle.style.fontFamily = fontSel.value; editor.style.fontFamily = fontSel.value; editor.style.fontSize = sizeSlide.value + 'px';
            bgImg.style.filter = `blur(${blurSlide.value}px)`;
            
            if(t === 'y2k' || t === 'diary') cap.style.setProperty('--text-color', '#000'); else cap.style.setProperty('--text-color', '#fff');
            
            if(t === 'y2k') { document.getElementById('text-body').className = "y2k-screen"; document.getElementById('text-body').style.padding = 'var(--pad, 50px)'; } 
            else { document.getElementById('text-body').className = ""; document.getElementById('text-body').style.padding = '0'; }
            
            saveSettings();
        }

        function updateLayout() {
            const w = 1080, h = ratioSel.value === '1:1' ? 1080 : 1920;
            const b = document.createElement('canvas'); b.width = dCanvas.width; b.height = dCanvas.height; b.getContext('2d').drawImage(dCanvas,0,0);
            cap.style.width = w + 'px'; cap.style.height = h + 'px'; dCanvas.width = w; dCanvas.height = h; dCtx.drawImage(b,0,0);
            const sc = wrapper.clientWidth / w; cap.style.transform = `scale(${sc})`; wrapper.style.height = (h*sc) + 'px';
        }

        // [버그 5 수리: 저장 시 왜곡 방지 및 고화질 캡처 딜레이 확보]
        document.getElementById('saveBtn').onclick = () => {
            document.querySelectorAll('.sticker').forEach(s => s.classList.remove('sticker-active'));
            const oldT = cap.style.transform; cap.style.transform = 'scale(1)'; 
            
            // 캡처 전 0.15초 숨을 고르며 브라우저가 화면을 찌그러짐 없이 완벽히 로드할 시간을 줌
            setTimeout(() => {
                html2canvas(cap, { scale: 1, useCORS: true, allowTaint: true }).then(canvas => {
                    cap.style.transform = oldT;
                    const a = document.createElement('a'); a.download = `ARCH_V_FINAL_${Date.now()}.png`; a.href = canvas.toDataURL(); a.click();
                });
            }, 150);
        };

        // 데이터 동기화 및 부가 기능
        for(let c in archList) catSel.add(new Option(c, c));
        catSel.onchange = () => { charSel.innerHTML = ""; archList[catSel.value].forEach(n => charSel.add(new Option(n, n))); render(); };
        function saveSettings() { localStorage.setItem('arch_v_final_data', JSON.stringify({ cat: catSel.value, char: charSel.value, rat: ratioSel.value, thm: themeSel.value, fnt: fontSel.value, size: sizeSlide.value, c1: c1.value, c2: c2.value, c3: c3.value, c4: c4.value, pad: padSlide.value, rad: radSlide.value, blur: blurSlide.value, html: editor.innerHTML })); }
        function loadSettings() { const s = JSON.parse(localStorage.getItem('arch_v_final_data')); if(s) { catSel.value = s.cat; catSel.dispatchEvent(new Event('change')); charSel.value = s.char; ratioSel.value = s.rat; themeSel.value = s.thm; fontSel.value = s.fnt; sizeSlide.value = s.size; c1.value = s.c1; c2.value = s.c2; if(s.c3) c3.value = s.c3; if(s.c4) c4.value = s.c4; padSlide.value = s.pad; radSlide.value = s.rad; if(s.blur) blurSlide.value = s.blur; editor.innerHTML = s.html; } else catSel.dispatchEvent(new Event('change')); }
        
        drawBtn.onclick = () => { drawMode = !drawMode; drawBtn.innerText = drawMode ? "🖌️ 낙서 ON" : "🖌️ 낙서 OFF"; drawBtn.classList.toggle('active', drawMode); dCanvas.style.pointerEvents = drawMode ? "auto" : "none"; };
        dCanvas.onmousedown = (e) => { if(!drawMode) return; isDrawing = true; const r = dCanvas.getBoundingClientRect(), s = 1080/r.width; dCtx.beginPath(); dCtx.moveTo((e.clientX-r.left)*s, (e.clientY-r.top)*s); dCtx.strokeStyle = document.getElementById('penColor').value; dCtx.lineWidth = parseInt(document.getElementById('penSize').value); dCtx.lineCap="round"; dCtx.lineJoin="round"; };
        dCanvas.onmousemove = (e) => { if(!isDrawing) return; const r = dCanvas.getBoundingClientRect(), s = 1080/r.width; dCtx.lineTo((e.clientX-r.left)*s, (e.clientY-r.top)*s); dCtx.stroke(); };
        window.addEventListener('mouseup', () => isDrawing = false);
        document.getElementById('clearBtn').onclick = () => { if(confirm("낙서를 모두 지우겠습니까?")) dCtx.clearRect(0,0,1080,1080); };
        
        // 배경 이미지 (<div> cover 속성 주입)
        document.getElementById('bgFile').onchange = (e) => { const r = new FileReader(); r.onload = (ev) => { bgImg.style.backgroundImage = `url('${ev.target.result}')`; bgImg.style.display = 'block'; render(); }; r.readAsDataURL(e.target.files[0]); };
        document.getElementById('delBgBtn').onclick = () => { bgImg.style.backgroundImage = "none"; bgImg.style.display = "none"; render(); };
        document.getElementById('manualBtn').onclick = () => alert("보스, 여기에 설명서 내용을 입력하십시오!");
        document.getElementById('resetBtn').onclick = () => { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } };
        
        document.querySelectorAll('input, select').forEach(el => { el.oninput = (el.id === 'ratioSel' || el.id === 'themeSel') ? () => { updateLayout(); render(); } : render; });
        window.onresize = updateLayout; window.onload = () => { loadSettings(); updateLayout(); render(); };
    </script>
</body>
</html>
