<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH EXCERPT STUDIO</title>
    <link rel="manifest" href="manifest.json">
    <!-- html2canvas 라이브러리 (DOM을 이미지로 변환) -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        /* 기본 폰트 로드 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        
        @font-face { font-family: 'KoPubDotum'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/KoPubDotum.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'MaruBuri'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/MaruBuri-Regular.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'ChosunIlbo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/Chosunilbo_myungjo.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'LeeSeoyun'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff'); font-weight: normal; font-style: normal; }
        @font-face { font-family: 'Kkubulrim'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/TTogether.woff') format('woff'); font-weight: normal; font-style: normal; }

        :root {
            --bg-base: #0a0a0a;
            --bg-panel: #161616;
            --border-color: #2a2a2a;
            --accent: #f47b20;
            --text-main: #f0f0f0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: "Pretendard Variable", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 1.5rem; text-align: center; text-transform: uppercase; margin-bottom: 20px; color: #fff; }

        .container { width: 100%; max-width: 600px; }

        /* 미리보기 컨테이너 (화면 크기에 맞게 축소 표시) */
        .preview-wrapper {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            /* 높이는 JS에서 비율에 맞게 조절 */
        }

        /* 실제 캡처 영역 (1080x1080 또는 1080x1920 고정) */
        #capture-area {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            overflow: hidden;
            background-color: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* 테마별 디자인 CSS */
        .theme-standard { background-color: #121212; }
        .theme-standard .bg-image {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        .theme-standard .content-card {
            position: relative; z-index: 2; background: rgba(0,0,0,0.6); padding: 80px;
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            width: 80%; max-height: 80%; display: flex; flex-direction: column; justify-content: center;
        }

        .theme-y2k { background-color: #c0c0c0; color: #000; font-family: "Gulim", sans-serif !important; }
        .theme-y2k .content-card {
            background: #c0c0c0; border-top: 4px solid #fff; border-left: 4px solid #fff; border-right: 4px solid #808080; border-bottom: 4px solid #808080;
            width: 85%; padding: 10px; display: flex; flex-direction: column;
        }
        .theme-y2k .y2k-header { background: #000080; color: #fff; padding: 10px 15px; font-weight: bold; font-size: 28px; margin-bottom: 20px; display:flex; justify-content: space-between;}
        .theme-y2k .y2k-body { background: #fff; border-top: 4px solid #808080; border-left: 4px solid #808080; border-right: 4px solid #fff; border-bottom: 4px solid #fff; padding: 50px; min-height: 400px; }
        .theme-y2k .y2k-controls { margin-top: 20px; display: flex; gap: 10px; justify-content: center; font-size: 40px; }

        .theme-diary { background-color: #fdfbf7; color: #333; background-image: linear-gradient(#e5e5e5 2px, transparent 2px); background-size: 100% 60px; }
        .theme-diary .content-card {
            width: 80%; padding: 60px; background: rgba(255,255,255,0.5); position: relative;
        }
        .theme-diary .tape {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%) rotate(-2deg);
            width: 250px; height: 60px; background: rgba(255, 235, 150, 0.6); box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .theme-sf { background-color: #050505; color: #0ff; background-image: radial-gradient(circle, #001111 10%, transparent 10%), radial-gradient(circle, #001111 10%, transparent 10%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        .theme-sf .content-card {
            width: 85%; padding: 60px; border: 2px solid #0ff; box-shadow: 0 0 30px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
            background: rgba(0, 10, 10, 0.8); position: relative;
        }
        .theme-sf .sf-corner { position: absolute; width: 40px; height: 40px; border: 4px solid #0ff; }
        .theme-sf .sf-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .theme-sf .sf-br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        /* 리치 텍스트 에디터 영역 */
        .rich-text-area {
            width: 100%; outline: none; white-space: pre-wrap; word-break: break-all;
        }

        /* 패널 UI */
        .panel { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        label { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; display: block; font-weight: bold; }
        select, input[type="range"], input[type="file"], input[type="text"] { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        /* 텍스트 포맷팅 툴바 */
        .toolbar { display: flex; gap: 5px; background: #222; padding: 10px; border-radius: 6px; align-items: center; flex-wrap: wrap; }
        .tool-btn { background: #333; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tool-btn:hover { background: #555; }
        .color-picker { width: 35px; height: 35px; border: none; padding: 0; background: transparent; cursor: pointer; }

        .btn-export { background: var(--accent); color: #fff; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
    </style>
</head>
<body>

    <div class="container">
        <h1>ARCH EXCERPT STUDIO</h1>

        <!-- 미리보기 래퍼 -->
        <div class="preview-wrapper" id="preview-wrapper">
            <!-- 고해상도 캡처 캔버스 (실제 저장되는 영역) -->
            <div id="capture-area" class="theme-standard">
                <!-- 표준 테마 요소 -->
                <img id="bgImage" class="bg-image" style="display:none;">
                <div id="card-container" class="content-card">
                    <!-- Y2K 테마 전용 헤더 -->
                    <div id="y2k-header" class="y2k-header" style="display:none;">
                        <span>▶ ARCH_PLAYER.exe</span><span>_ □ X</span>
                    </div>
                    <!-- SF 테마 전용 코너 -->
                    <div id="sf-tl" class="sf-corner sf-tl" style="display:none;"></div>
                    <div id="sf-br" class="sf-corner sf-br" style="display:none;"></div>
                    <!-- Diary 테마 테이프 -->
                    <div id="diary-tape" class="tape" style="display:none;"></div>

                    <!-- 텍스트 편집 영역 -->
                    <div id="text-body" class="y2k-body" style="padding:0; border:none; background:transparent;">
                        <div id="editor" class="rich-text-area" contenteditable="true" spellcheck="false" style="font-size: 50px; line-height: 1.5;">여기에 발췌할 대사를 입력하거나 공유 받으십시오, 보스.<br><br>일부 텍스트만 <b>드래그하여</b> 볼드, 이탤릭, 색상을 변경할 수 있습니다.</div>
                    </div>

                    <!-- Y2K 테마 전용 하단 -->
                    <div id="y2k-controls" class="y2k-controls" style="display:none;">
                        <span>⏮</span><span>▶</span><span>⏸</span><span>⏭</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="toolbar">
                <span style="font-size:0.8rem; color:#aaa; margin-right:5px;">부분 서식:</span>
                <button class="tool-btn" onclick="document.execCommand('bold',false,null)">B</button>
                <button class="tool-btn" onclick="document.execCommand('italic',false,null)">I</button>
                <button class="tool-btn" onclick="document.execCommand('underline',false,null)">U</button>
                <input type="color" class="color-picker" id="partialColor" onchange="document.execCommand('foreColor',false,this.value)">
                <button class="tool-btn" onclick="document.execCommand('removeFormat',false,null)" style="font-size: 0.8rem;">서식 초기화</button>
            </div>

            <div class="row">
                <div>
                    <label>비율 (해상도)</label>
                    <select id="ratioSelect">
                        <option value="1:1">1:1 (1080 x 1080)</option>
                        <option value="9:16">9:16 (1080 x 1920)</option>
                    </select>
                </div>
                <div>
                    <label>테마 레이아웃</label>
                    <select id="themeSelect">
                        <option value="standard">일반 (Standard)</option>
                        <option value="y2k">Y2K 뮤직 플레이어</option>
                        <option value="diary">다이어리 (Diary)</option>
                        <option value="sf">SF 테크 (Sci-Fi)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>폰트 (전체)</label>
                    <select id="fontSelect">
                        <option value="'Pretendard Variable', sans-serif">프리텐다드 (기본)</option>
                        <option value="'KoPubDotum', sans-serif">코펍돋움</option>
                        <option value="'MaruBuri', serif">마루부리 (마루미냐)</option>
                        <option value="'ChosunIlbo', serif">조선일보명조</option>
                        <option value="'Noto Serif KR', serif">본명조 (Noto Serif)</option>
                        <option value="'LeeSeoyun', cursive">이서윤체</option>
                        <option value="'Kkubulrim', cursive">꾸불림체</option>
                    </select>
                </div>
                <div>
                    <label>전체 폰트 크기</label>
                    <input type="range" id="fontSizeSlider" min="30" max="120" value="50">
                </div>
            </div>

            <div id="standardOptions">
                <label>배경 색상 (일반 테마용)</label>
                <input type="color" id="bgColorPicker" value="#121212" style="width:100%; height:40px; padding:0; border:none;">
                <label style="margin-top:10px;">또는 배경 이미지 삽입</label>
                <input type="file" id="bgUpload" accept="image/*">
                <label style="margin-top:10px;">배경 이미지 블러(Blur)</label>
                <input type="range" id="blurSlider" min="0" max="30" value="0">
            </div>

            <button class="btn-export" id="exportBtn">💾 PNG 고화질 저장</button>
        </div>
    </div>

    <script>
        const previewWrapper = document.getElementById('preview-wrapper');
        const captureArea = document.getElementById('capture-area');
        const editor = document.getElementById('editor');
        const cardContainer = document.getElementById('card-container');
        const textBody = document.getElementById('text-body');
        
        // Options
        const ratioSelect = document.getElementById('ratioSelect');
        const themeSelect = document.getElementById('themeSelect');
        const fontSelect = document.getElementById('fontSelect');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const bgColorPicker = document.getElementById('bgColorPicker');
        const bgUpload = document.getElementById('bgUpload');
        const blurSlider = document.getElementById('blurSlider');

        // Theme specific elements
        const bgImage = document.getElementById('bgImage');
        const y2kHeader = document.getElementById('y2k-header');
        const y2kControls = document.getElementById('y2k-controls');
        const diaryTape = document.getElementById('diary-tape');
        const sfTl = document.getElementById('sf-tl');
        const sfBr = document.getElementById('sf-br');

        // PWA 공유 텍스트 수신
        window.addEventListener('DOMContentLoaded', () => {
            const parsedUrl = new URL(window.location.href);
            const sharedText = parsedUrl.searchParams.get('text') || parsedUrl.searchParams.get('title');
            if (sharedText) {
                editor.innerHTML = decodeURIComponent(sharedText).replace(/\n/g, '<br>');
            }
            updateLayout();
        });

        // 윈도우 리사이즈 시 프리뷰 스케일 조정
        window.addEventListener('resize', updateLayout);

        // 이벤트 리스너
        ratioSelect.addEventListener('change', updateLayout);
        
        themeSelect.addEventListener('change', (e) => {
            captureArea.className = `theme-${e.target.value}`;
            
            // 요소 가시성 토글
            bgImage.style.display = (e.target.value === 'standard' && bgImage.src) ? 'block' : 'none';
            y2kHeader.style.display = e.target.value === 'y2k' ? 'flex' : 'none';
            y2kControls.style.display = e.target.value === 'y2k' ? 'flex' : 'none';
            diaryTape.style.display = e.target.value === 'diary' ? 'block' : 'none';
            sfTl.style.display = e.target.value === 'sf' ? 'block' : 'none';
            sfBr.style.display = e.target.value === 'sf' ? 'block' : 'none';

            // Y2K 내부 패딩 조정
            if(e.target.value === 'y2k') {
                textBody.style.padding = '50px';
                textBody.style.background = '#fff';
                textBody.style.borderTop = '4px solid #808080';
                textBody.style.borderLeft = '4px solid #808080';
                textBody.style.borderRight = '4px solid #fff';
                textBody.style.borderBottom = '4px solid #fff';
            } else {
                textBody.style.padding = '0';
                textBody.style.background = 'transparent';
                textBody.style.border = 'none';
            }
        });

        fontSelect.addEventListener('change', (e) => { editor.style.fontFamily = e.target.value; });
        fontSizeSlider.addEventListener('input', (e) => { editor.style.fontSize = e.target.value + 'px'; });
        bgColorPicker.addEventListener('input', (e) => { captureArea.style.backgroundColor = e.target.value; });
        blurSlider.addEventListener('input', (e) => { bgImage.style.filter = `blur(${e.target.value}px)`; });

        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    bgImage.src = event.target.result;
                    if(themeSelect.value === 'standard') bgImage.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // 캡처 영역 스케일 연산 엔진
        function updateLayout() {
            const width = 1080;
            const height = ratioSelect.value === '1:1' ? 1080 : 1920;
            
            captureArea.style.width = width + 'px';
            captureArea.style.height = height + 'px';

            // 디바이스 화면 폭에 맞춰 스케일 다운 (프리뷰 용도)
            const containerWidth = previewWrapper.clientWidth;
            const scale = containerWidth / width;
            
            captureArea.style.transform = `scale(${scale})`;
            previewWrapper.style.height = (height * scale) + 'px';
        }

        // 이미지 추출 엔진 (html2canvas)
        document.getElementById('exportBtn').addEventListener('click', () => {
            const originalTransform = captureArea.style.transform;
            // 캡처를 위해 잠시 스케일을 1로 복구 (고화질 보장)
            captureArea.style.transform = 'scale(1)';
            
            html2canvas(captureArea, {
                scale: 1, // 1080px 1:1 매칭
                useCORS: true,
                backgroundColor: null
            }).then(canvas => {
                captureArea.style.transform = originalTransform; // 스케일 원상복구
                
                const link = document.createElement('a');
                link.download = `ARCH_EXCERPT_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                captureArea.style.transform = originalTransform;
                alert("렌더링 오류가 발생했습니다. 브라우저 설정을 확인해 주십시오.");
            });
        });

    </script>
</body>
</html>
